<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Whiteboard · Top Indicator Zoom/Pan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      --bg: #0f1219;
      --surface: #1a1f2e;
      --surface2: #222940;
      --accent: #4b8eff;
      --danger: #f24e4e;
      --text: #e8ecf2;
      --text2: #94a3b8;
      --border: #2a3348;
    }
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }
    body { background:#070a10; font-family:'Inter',sans-serif; height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; touch-action:manipulation; }

    #toolbar {
      display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:8px 14px;
      background:rgba(15,18,25,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:50;
    }
    .tool-group { display:flex; gap:4px; align-items:center; }
    .tool-btn {
      background:var(--surface2); border:1px solid transparent; color:var(--text); padding:9px 15px;
      border-radius:30px; font-size:13px; font-weight:500; cursor:pointer; transition:0.18s; white-space:nowrap;
      display:inline-flex; align-items:center; gap:5px; outline:none;
    }
    .tool-btn.active { background:var(--accent); border-color:#7db4ff; color:#fff; box-shadow:0 0 18px rgba(75,142,255,0.4); }
    .tool-btn.danger-active { background:var(--danger); border-color:#ff6b6b; color:#fff; }
    .tool-btn.recording { background:#e02424; border-color:#ff5252; color:#fff; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 8px rgba(224,36,36,0.5)} 50%{box-shadow:0 0 26px rgba(224,36,36,0.9)} }
    input[type="color"] { width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid #fff; padding:1px; }
    input[type="range"] { width:60px; accent-color:var(--accent); }
    .sep { width:1px; height:24px; background:var(--border); margin:0 5px; }

    #boards-container { flex:1; display:flex; flex-direction:column; gap:8px; padding:8px; overflow:hidden; }
    .top-board { flex:1; background:var(--surface); border-radius:14px; border:1px solid rgba(75,142,255,0.25); overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; }
    .bottom-board { flex:1.6; background:#0c1019; border-radius:14px; border:1px solid rgba(120,130,255,0.25); overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; }
    canvas { display:block; background:#fff; max-width:100%; max-height:100%; object-fit:contain; }
    #topCanvas { cursor:default; }
    #bottomCanvas { touch-action:none; cursor:crosshair; }

    #pdf-slider { background:#0d1119; padding:8px 14px; display:none; align-items:center; gap:10px; overflow-x:auto; border-bottom:1px solid var(--border); }
    .thumb { width:68px; height:46px; border-radius:8px; cursor:pointer; border:2px solid transparent; overflow:hidden; background:#fff; flex-shrink:0; }
    .thumb.active { border-color:var(--accent); box-shadow:0 0 18px rgba(75,142,255,0.5); }
    .thumb canvas { width:100%; height:100%; }

    #latex-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); align-items:center; justify-content:center; z-index:200; }
    #latex-modal.show { display:flex; }
    .modal-box { background:var(--surface); padding:24px; border-radius:14px; width:440px; max-width:94vw; border:1px solid var(--border); }
    textarea { width:100%; background:#111827; color:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; font-family:monospace; resize:vertical; }

    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--surface2); color:#fff; padding:10px 26px; border-radius:30px; font-size:13px; z-index:300; opacity:0; transition:0.3s; pointer-events:none; }
    .toast.show { opacity:1; }

    /* ── INTERACTIVE VIEWPORT INDICATOR ── */
    #viewport-indicator {
      position: absolute;
      border: 2px solid rgba(255,180,60,0.9);
      background: rgba(255,180,60,0.15);
      pointer-events: auto; /* can be interacted */
      border-radius: 4px;
      z-index: 20;
      cursor: move;
      box-sizing: border-box;
    }
    .handle {
      position: absolute;
      width: 14px; height: 14px;
      background: #ffb43c;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: auto;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .handle.tl { top:-7px; left:-7px; cursor:nw-resize; }
    .handle.tr { top:-7px; right:-7px; cursor:ne-resize; }
    .handle.bl { bottom:-7px; left:-7px; cursor:sw-resize; }
    .handle.br { bottom:-7px; right:-7px; cursor:se-resize; }
    .handle.tm { top:-7px; left:50%; transform:translateX(-50%); cursor:n-resize; }
    .handle.bm { bottom:-7px; left:50%; transform:translateX(-50%); cursor:s-resize; }
    .handle.ml { top:50%; left:-7px; transform:translateY(-50%); cursor:w-resize; }
    .handle.mr { top:50%; right:-7px; transform:translateY(-50%); cursor:e-resize; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" id="btn-pen">✒️ Pen</button>
      <button class="tool-btn" id="btn-eraser">🧹 Eraser</button>
      <button class="tool-btn" id="btn-stroke-eraser">✂️ Stroke</button>
      <button class="tool-btn" id="btn-edit">🔧 Edit</button>
    </div>
    <div class="sep"></div>
    <input type="color" id="penColor" value="#1e293b">
    <input type="range" id="penSize" min="1" max="16" value="3">
    <span style="color:var(--text2);font-size:12px;min-width:28px;" id="sizeLabel">3px</span>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-undo">↩ Undo</button>
    <button class="tool-btn" id="btn-redo">↪ Redo</button>
    <button class="tool-btn" id="btn-clear">🗑 Clear</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-shape-rect">▭</button>
    <button class="tool-btn" id="btn-shape-circle">○</button>
    <button class="tool-btn" id="btn-shape-triangle">△</button>
    <button class="tool-btn" id="btn-shape-line">╱</button>
    <button class="tool-btn" id="btn-image">🖼 Img</button>
    <button class="tool-btn" id="btn-latex">📐 LaTeX</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-record">🎤 Rec</button>
    <span style="color:var(--text2);font-size:11px;min-width:38px;" id="recStatus">Off</span>
    <button class="tool-btn" id="btn-pdf-upload">📄 PDF</button>
    <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
  </div>

  <div id="pdf-slider"></div>

  <div id="boards-container">
    <div class="top-board">
      <div class="canvas-wrapper" id="topWrapper">
        <canvas id="topCanvas"></canvas>
        <div id="viewport-indicator">
          <div class="handle tl"></div><div class="handle tr"></div>
          <div class="handle bl"></div><div class="handle br"></div>
          <div class="handle tm"></div><div class="handle bm"></div>
          <div class="handle ml"></div><div class="handle mr"></div>
        </div>
      </div>
    </div>
    <div class="bottom-board">
      <div class="canvas-wrapper" id="bottomWrapper">
        <canvas id="bottomCanvas"></canvas>
      </div>
    </div>
  </div>

  <div id="latex-modal">
    <div class="modal-box">
      <h3 style="color:white;">📐 Enter LaTeX Equation</h3>
      <textarea id="latexInput" rows="3" placeholder="\frac{-b \pm \sqrt{b^2 - 4ac}}{2a}"></textarea>
      <div id="latexPreview" style="min-height:38px;margin:10px 0;padding:8px;background:#111827;border-radius:8px;color:#fff;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="tool-btn" id="latexCancel">Cancel</button>
        <button class="tool-btn" id="latexInsert" style="background:var(--accent);color:#fff;">Insert</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // ── DOM refs
      const topCanvas = document.getElementById('topCanvas');
      const topCtx = topCanvas.getContext('2d');
      const bottomCanvas = document.getElementById('bottomCanvas');
      const bottomCtx = bottomCanvas.getContext('2d');
      const topWrapper = document.getElementById('topWrapper');
      const viewportIndicator = document.getElementById('viewport-indicator');
      const btnRecord = document.getElementById('btn-record');
      const recStatus = document.getElementById('recStatus');

      // ── Constants
      const WORLD_W = 1280;
      const WORLD_H = 720;
      let displayW, displayH;

      // ── View state (for bottom canvas)
      let zoom = 2.0;
      let panX = 0, panY = 0;

      // ── Content
      let strokes = [];
      let shapes = [];
      let images = [];
      let latexItems = [];
      let nextId = 1;
      const MAX_HISTORY = 60;
      let undoStack = [], redoStack = [];

      // ── Tools
      let currentTool = 'pen';
      let editMode = false;
      let penColor = '#1e293b';
      let penSize = 3;
      let isDrawing = false;
      let currentStroke = null;

      // ── Edit mode
      let selectedItem = null;
      let editDragMode = null;
      let editStart = {x:0,y:0};
      let editItemStart = null;

      // ── PDF
      let pdfDoc = null, pdfPages = [], currentPdfPage = 0, pdfBgImage = null;

      // ── Recording
      let mediaRecorder = null, recordedChunks = [], isRecording = false, audioStream = null;

      // ═══════════════════════════════════════
      // RESIZE (both canvases identical)
      // ═══════════════════════════════════════
      function resizeCanvases() {
        const topRect = topWrapper.getBoundingClientRect();
        const bottomRect = document.getElementById('bottomWrapper').getBoundingClientRect();
        const maxW = Math.min(topRect.width, bottomRect.width);
        const maxH = Math.min(topRect.height, bottomRect.height);
        if (maxW / maxH > WORLD_W / WORLD_H) {
          displayH = maxH;
          displayW = displayH * (WORLD_W / WORLD_H);
        } else {
          displayW = maxW;
          displayH = displayW / (WORLD_W / WORLD_H);
        }
        topCanvas.width = WORLD_W; topCanvas.height = WORLD_H;
        topCanvas.style.width = displayW + 'px'; topCanvas.style.height = displayH + 'px';
        bottomCanvas.width = WORLD_W; bottomCanvas.height = WORLD_H;
        bottomCanvas.style.width = displayW + 'px'; bottomCanvas.style.height = displayH + 'px';
        clampPan();
        updateViewportIndicator();
        renderAll();
      }
      function clampPan() {
        const vw = WORLD_W / zoom, vh = WORLD_H / zoom;
        panX = Math.min(0, Math.max(-WORLD_W + vw, panX));
        panY = Math.min(0, Math.max(-WORLD_H + vh, panY));
        if (vw >= WORLD_W) panX = (WORLD_W - vw)/2;
        if (vh >= WORLD_H) panY = (WORLD_H - vh)/2;
      }
      window.addEventListener('resize', resizeCanvases);
      resizeCanvases();

      // ── History
      function saveState() {
        undoStack.push({
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(i=>({...i,imgElement:null})),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        });
        if(undoStack.length>MAX_HISTORY) undoStack.shift();
        redoStack=[];
      }
      function undo() {
        if(!undoStack.length) return;
        redoStack.push(snapshot());
        const prev=undoStack.pop(); restore(prev); renderAll();
      }
      function redo() {
        if(!redoStack.length) return;
        undoStack.push(snapshot());
        const next=redoStack.pop(); restore(next); renderAll();
      }
      function snapshot() {
        return {
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(i=>({...i,imgElement:null})),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        };
      }
      function restore(state) {
        strokes=state.strokes; shapes=state.shapes;
        const imgMap=new Map(images.map(i=>[i.id,i.imgElement]));
        images=state.images.map(p=>({...p,imgElement:imgMap.get(p.id)}));
        latexItems=state.latexItems;
      }

      // ── Rendering
      function renderAll() { renderTop(); renderBottom(); }
      function renderTop() {
        topCtx.clearRect(0,0,WORLD_W,WORLD_H);
        topCtx.fillStyle='#fff'; topCtx.fillRect(0,0,WORLD_W,WORLD_H);
        if(pdfBgImage) topCtx.drawImage(pdfBgImage,0,0,WORLD_W,WORLD_H);
        drawContent(topCtx);
      }
      function renderBottom() {
        bottomCtx.clearRect(0,0,WORLD_W,WORLD_H);
        bottomCtx.fillStyle='#fff'; bottomCtx.fillRect(0,0,WORLD_W,WORLD_H);
        bottomCtx.save(); bottomCtx.translate(panX,panY); bottomCtx.scale(zoom,zoom);
        if(pdfBgImage){ bottomCtx.globalAlpha=0.5; bottomCtx.drawImage(pdfBgImage,0,0,WORLD_W,WORLD_H); bottomCtx.globalAlpha=1; }
        drawContent(bottomCtx);
        bottomCtx.restore();
        drawGrid();
        bottomCtx.strokeStyle='#aaa'; bottomCtx.lineWidth=1.5; bottomCtx.strokeRect(0,0,WORLD_W,WORLD_H);
      }
      function drawContent(ctx) {
        for(const s of strokes) {
          ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
          if(s.type==='eraser'){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; }
          else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=s.color; }
          ctx.lineWidth=s.size;
          if(s.points.length>=2){ ctx.beginPath(); ctx.moveTo(s.points[0].x,s.points[0].y);
            for(let i=1;i<s.points.length;i++){ const p=s.points[i-1],c=s.points[i]; ctx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2); }
            ctx.lineTo(s.points[s.points.length-1].x,s.points[s.points.length-1].y); ctx.stroke(); }
          else if(s.points.length===1){ ctx.beginPath(); ctx.arc(s.points[0].x,s.points[0].y,s.size/2,0,Math.PI*2); ctx.fillStyle=s.type==='eraser'?'#000':s.color; ctx.fill(); }
          ctx.restore();
        }
        for(const sh of shapes) { /* same as before */ }
        for(const img of images) { /* same as before */ }
        for(const lt of latexItems) { /* same as before */ }
      }
      function drawGrid() { /* same grid */ }

      // ═══════════════════════════════════════
      // VIEWPORT INDICATOR (interactive)
      // ═══════════════════════════════════════
      function updateViewportIndicator() {
        const vw = WORLD_W / zoom, vh = WORLD_H / zoom;
        const scaleX = displayW / WORLD_W, scaleY = displayH / WORLD_H;
        const left = -panX * scaleX, top = -panY * scaleY;
        const width = vw * scaleX, height = vh * scaleY;
        viewportIndicator.style.left = left + 'px';
        viewportIndicator.style.top = top + 'px';
        viewportIndicator.style.width = width + 'px';
        viewportIndicator.style.height = height + 'px';
      }

      // ── Indicator drag/resize state
      let isDraggingIndicator = false;
      let indicatorDragStart = { x:0, y:0, panX:0, panY:0 };
      let isResizingIndicator = false;
      let resizeHandle = null;
      let resizeStart = { x:0, y:0, left:0, top:0, width:0, height:0 };

      // Attach handlers to viewport-indicator and handles
      viewportIndicator.addEventListener('pointerdown', (e) => {
        if (e.target === viewportIndicator) {
          // Dragging the whole rectangle
          isDraggingIndicator = true;
          indicatorDragStart = {
            x: e.clientX,
            y: e.clientY,
            panX: panX,
            panY: panY
          };
          viewportIndicator.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      // Handle resize handles
      document.querySelectorAll('.handle').forEach(handle => {
        handle.addEventListener('pointerdown', (e) => {
          isResizingIndicator = true;
          resizeHandle = handle.classList[1]; // tl, tr, etc.
          const rect = viewportIndicator.getBoundingClientRect();
          resizeStart = {
            x: e.clientX,
            y: e.clientY,
            left: parseFloat(viewportIndicator.style.left),
            top: parseFloat(viewportIndicator.style.top),
            width: parseFloat(viewportIndicator.style.width),
            height: parseFloat(viewportIndicator.style.height)
          };
          handle.setPointerCapture(e.pointerId);
          e.stopPropagation();
          e.preventDefault();
        });
      });

      window.addEventListener('pointermove', (e) => {
        if (isDraggingIndicator) {
          const dx = e.clientX - indicatorDragStart.x;
          const dy = e.clientY - indicatorDragStart.y;
          const scaleX = displayW / WORLD_W, scaleY = displayH / WORLD_H;
          panX = indicatorDragStart.panX - dx / scaleX;
          panY = indicatorDragStart.panY - dy / scaleY;
          clampPan();
          updateViewportIndicator();
          renderBottom();
        }
        if (isResizingIndicator && resizeHandle) {
          const dx = e.clientX - resizeStart.x;
          const dy = e.clientY - resizeStart.y;
          const scaleX = displayW / WORLD_W, scaleY = displayH / WORLD_H;
          let newLeft = resizeStart.left, newTop = resizeStart.top;
          let newWidth = resizeStart.width, newHeight = resizeStart.height;

          // Adjust based on handle
          if (resizeHandle.includes('l')) { newLeft += dx; newWidth -= dx; }
          if (resizeHandle.includes('r')) { newWidth += dx; }
          if (resizeHandle.includes('t')) { newTop += dy; newHeight -= dy; }
          if (resizeHandle.includes('b')) { newHeight += dy; }
          if (resizeHandle === 'tm') { newTop += dy; newHeight -= dy; }
          if (resizeHandle === 'bm') { newHeight += dy; }
          if (resizeHandle === 'ml') { newLeft += dx; newWidth -= dx; }
          if (resizeHandle === 'mr') { newWidth += dx; }

          // Minimum size
          const minW = 30, minH = 30;
          if (newWidth < minW) {
            if (resizeHandle.includes('l') || resizeHandle==='ml') newLeft -= (minW - newWidth);
            newWidth = minW;
          }
          if (newHeight < minH) {
            if (resizeHandle.includes('t') || resizeHandle==='tm') newTop -= (minH - newHeight);
            newHeight = minH;
          }

          // Convert to world coords
          const worldLeft = newLeft / scaleX;
          const worldTop = newTop / scaleY;
          const worldWidth = newWidth / scaleX;
          const worldHeight = newHeight / scaleY;

          // Compute new zoom and pan
          const newZoomX = WORLD_W / worldWidth;
          const newZoomY = WORLD_H / worldHeight;
          const newZoom = Math.min(8, Math.max(0.5, Math.min(newZoomX, newZoomY)));
          panX = -worldLeft;
          panY = -worldTop;
          zoom = newZoom;
          clampPan();

          updateViewportIndicator();
          renderBottom();
        }
      });

      window.addEventListener('pointerup', () => {
        if (isDraggingIndicator) { isDraggingIndicator = false; }
        if (isResizingIndicator) { isResizingIndicator = false; resizeHandle = null; }
      });

      // ═══════════════════════════════════════
      // BOTTOM CANVAS — Drawing only (simple, reliable)
      // ═══════════════════════════════════════
      function getWorldFromClient(clientX, clientY) {
        const rect = bottomCanvas.getBoundingClientRect();
        const sx = (clientX - rect.left) * (WORLD_W / rect.width);
        const sy = (clientY - rect.top) * (WORLD_H / rect.height);
        return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
      }

      bottomCanvas.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return; // ignore non-left mouse
        e.preventDefault();
        const world = getWorldFromClient(e.clientX, e.clientY);
        if (currentTool === 'pan') return;
        if (editMode && currentTool === 'edit') {
          const hit = hitTest(world.x, world.y);
          if (hit) {
            selectItem(hit);
            editDragMode = 'move';
            editStart = { x: e.clientX, y: e.clientY };
            const item = getSelectedItem();
            if (item) editItemStart = { x: item.x, y: item.y };
          } else { deselectAll(); renderAll(); }
          return;
        }
        if (currentTool === 'pen' || currentTool === 'eraser') {
          saveState();
          isDrawing = true;
          currentStroke = {
            id: nextId++,
            type: currentTool === 'eraser' ? 'eraser' : 'pen',
            points: [{ x: world.x, y: world.y }],
            color: currentTool === 'eraser' ? '#000' : penColor,
            size: currentTool === 'eraser' ? 22 : penSize
          };
          strokes.push(currentStroke);
          renderAll();
        } else if (currentTool === 'strokeEraser') {
          const hitIdx = strokes.findIndex(s => s.type !== 'eraser' && pointNearStroke(world, s, 18));
          if (hitIdx !== -1) { saveState(); strokes.splice(hitIdx, 1); renderAll(); }
        } else if (currentTool.startsWith('shape-')) {
          saveState();
          const shape = {
            id: nextId++, type: currentTool.replace('shape-', ''),
            x: world.x, y: world.y, w: 0, h: 0,
            rotation: 0, color: penColor, fill: 'transparent', selected: false
          };
          shapes.push(shape);
          isDrawing = false;
          window._drawingShape = shape;
        }
      });

      bottomCanvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        if (editDragMode && selectedItem) {
          const dx = (e.clientX - editStart.x) / zoom;
          const dy = (e.clientY - editStart.y) / zoom;
          const item = getSelectedItem();
          if (item && editItemStart) { item.x = editItemStart.x + dx; item.y = editItemStart.y + dy; }
          renderAll();
          return;
        }
        if (isDrawing && currentStroke) {
          currentStroke.points.push(getWorldFromClient(e.clientX, e.clientY));
          renderAll();
        }
        if (window._drawingShape) {
          const world = getWorldFromClient(e.clientX, e.clientY);
          const shape = window._drawingShape;
          shape.x = Math.min(shape.x, world.x);
          shape.y = Math.min(shape.y, world.y);
          shape.w = Math.abs(world.x - shape.x);
          shape.h = Math.abs(world.y - shape.y);
          renderAll();
        }
      });

      window.addEventListener('pointerup', () => {
        if (isDrawing) { isDrawing = false; currentStroke = null; renderAll(); }
        if (window._drawingShape) {
          const shape = window._drawingShape;
          if (shape.w < 5 || shape.h < 5) shapes.pop();
          window._drawingShape = null;
          renderAll();
        }
        if (editDragMode) { editDragMode = null; editStart = null; editItemStart = null; renderAll(); }
      });

      // Wheel zoom still works on bottom canvas as fallback
      bottomCanvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = bottomCanvas.getBoundingClientRect();
        const sx = (e.clientX - rect.left) * (WORLD_W / rect.width);
        const sy = (e.clientY - rect.top) * (WORLD_H / rect.height);
        const wb = { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
        zoom = Math.min(8, Math.max(0.5, zoom * (1 - e.deltaY * 0.005)));
        const wa = { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
        panX += (wa.x - wb.x) * zoom;
        panY += (wa.y - wb.y) * zoom;
        clampPan();
        updateViewportIndicator();
        renderAll();
      }, { passive: false });

      // ═══════════════════════════════════════
      // Helper functions (hitTest, etc.)
      // ═══════════════════════════════════════
      function hitTest(wx, wy) {
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i]; if (wx >= s.x - 8 && wx <= s.x + s.w + 8 && wy >= s.y - 8 && wy <= s.y + s.h + 8) return { type: 'shape', index: i };
        }
        for (let i = images.length - 1; i >= 0; i--) {
          const im = images[i]; if (wx >= im.x && wx <= im.x + im.w && wy >= im.y && wy <= im.y + im.h) return { type: 'image', index: i };
        }
        for (let i = latexItems.length - 1; i >= 0; i--) {
          const lt = latexItems[i]; if (wx >= lt.x && wx <= lt.x + lt.w && wy >= lt.y && wy <= lt.y + lt.h) return { type: 'latex', index: i };
        }
        return null;
      }
      function selectItem(hit) { deselectAll(); selectedItem = hit; if (hit.type === 'shape') shapes[hit.index].selected = true; if (hit.type === 'image') images[hit.index].selected = true; if (hit.type === 'latex') latexItems[hit.index].selected = true; renderAll(); }
      function deselectAll() { shapes.forEach(s => s.selected = false); images.forEach(i => i.selected = false); latexItems.forEach(l => l.selected = false); selectedItem = null; renderAll(); }
      function getSelectedItem() { if (!selectedItem) return null; if (selectedItem.type === 'shape') return shapes[selectedItem.index]; if (selectedItem.type === 'image') return images[selectedItem.index]; if (selectedItem.type === 'latex') return latexItems[selectedItem.index]; return null; }
      function pointNearStroke(p, s, t) { return s.points.some(pt => Math.hypot(pt.x - p.x, pt.y - p.y) < t); }

      // ── Toolbar
      function setTool(tool) {
        currentTool = tool; editMode = (tool === 'edit');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active', 'danger-active'));
        const map = { pen: 'btn-pen', eraser: 'btn-eraser', strokeEraser: 'btn-stroke-eraser', edit: 'btn-edit', 'shape-rect': 'btn-shape-rect', 'shape-circle': 'btn-shape-circle', 'shape-triangle': 'btn-shape-triangle', 'shape-line': 'btn-shape-line' };
        const bid = map[tool]; if (bid) document.getElementById(bid).classList.add(tool === 'eraser' || tool === 'strokeEraser' ? 'danger-active' : 'active');
        if (!editMode) deselectAll();
        isDrawing = false; currentStroke = null;
        if (window._drawingShape) { shapes.pop(); window._drawingShape = null; }
        renderAll();
      }
      document.getElementById('btn-pen').onclick = () => setTool('pen');
      document.getElementById('btn-eraser').onclick = () => setTool('eraser');
      document.getElementById('btn-stroke-eraser').onclick = () => setTool('strokeEraser');
      document.getElementById('btn-edit').onclick = () => setTool('edit');
      document.getElementById('btn-shape-rect').onclick = () => setTool('shape-rect');
      document.getElementById('btn-shape-circle').onclick = () => setTool('shape-circle');
      document.getElementById('btn-shape-triangle').onclick = () => setTool('shape-triangle');
      document.getElementById('btn-shape-line').onclick = () => setTool('shape-line');
      document.getElementById('btn-undo').onclick = undo;
      document.getElementById('btn-redo').onclick = redo;
      document.getElementById('btn-clear').onclick = () => { if (confirm('Clear all?')) { saveState(); strokes = []; shapes = []; images = []; latexItems = []; renderAll(); } };
      document.getElementById('penColor').oninput = e => penColor = e.target.value;
      document.getElementById('penSize').oninput = e => { penSize = parseInt(e.target.value); document.getElementById('sizeLabel').textContent = penSize + 'px'; };
      document.getElementById('btn-image').onclick = () => {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = (e) => {
          const f = e.target.files[0]; if (!f) return;
          const r = new FileReader();
          r.onload = (ev) => {
            const img = new Image(); img.onload = () => {
              saveState();
              const h = 140, w = h * (img.width / img.height);
              images.push({ id: nextId++, imgElement: img, x: WORLD_W / 2 - w / 2, y: WORLD_H / 2 - h / 2, w, h, rotation: 0, selected: false });
              renderAll();
            }; img.src = ev.target.result;
          }; r.readAsDataURL(f);
        }; inp.click();
      };

      // LaTeX (unchanged)
      document.getElementById('btn-latex').onclick = () => document.getElementById('latex-modal').classList.add('show');
      document.getElementById('latexCancel').onclick = () => document.getElementById('latex-modal').classList.remove('show');
      document.getElementById('latexInsert').onclick = () => {
        const tex = document.getElementById('latexInput').value.trim(); if (!tex) return;
        const temp = document.createElement('div'); temp.style.cssText = 'position:absolute;left:-9999px;';
        temp.innerHTML = '\\[' + tex + '\\]'; document.body.appendChild(temp);
        MathJax.typesetPromise([temp]).then(() => {
          const svg = temp.querySelector('svg');
          if (svg) {
            const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const img = new Image(); img.onload = () => {
              saveState();
              const h = 55, w = h * (img.width / img.height);
              const cached = new Image(); cached.src = url;
              latexItems.push({ id: nextId++, cachedImg: cached, x: WORLD_W / 2 - w / 2, y: WORLD_H / 2 - h / 2, w, h, rotation: 0, selected: false });
              renderAll();
            }; img.src = url;
          }
          document.body.removeChild(temp);
        });
        document.getElementById('latex-modal').classList.remove('show');
      };

      // Recording (unchanged)
      async function startRecording() {
        if (isRecording) return;
        try { audioStream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null); } catch (e) { audioStream = null; }
        const canvasStream = topCanvas.captureStream(30);
        const tracks = [...canvasStream.getVideoTracks()];
        if (audioStream) tracks.push(...audioStream.getAudioTracks());
        mediaRecorder = new MediaRecorder(new MediaStream(tracks), { mimeType: 'video/webm' });
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = 'whiteboard-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.webm';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
          toast('✅ Recording saved!');
        };
        mediaRecorder.start(); isRecording = true;
        btnRecord.classList.add('recording'); btnRecord.textContent = '⏹ Stop';
        recStatus.textContent = '🔴 Rec'; recStatus.style.color = '#f24e4e';
        toast('🔴 Recording started');
      }
      function stopRecording() {
        if (!isRecording || !mediaRecorder || mediaRecorder.state !== 'recording') return;
        mediaRecorder.stop(); isRecording = false;
        btnRecord.classList.remove('recording'); btnRecord.textContent = '🎤 Rec';
        recStatus.textContent = 'Off'; recStatus.style.color = 'var(--text2)';
      }
      btnRecord.onclick = () => { if (isRecording) stopRecording(); else startRecording(); };

      // PDF (unchanged)
      document.getElementById('btn-pdf-upload').onclick = () => document.getElementById('pdfFileInput').click();
      document.getElementById('pdfFileInput').onchange = async (e) => {
        const f = e.target.files[0]; if (!f) return;
        const data = await f.arrayBuffer(); pdfDoc = await pdfjsLib.getDocument({ data }).promise;
        pdfPages = []; const slider = document.getElementById('pdf-slider'); slider.innerHTML = ''; slider.style.display = 'flex';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          const page = await pdfDoc.getPage(i); const vp = page.getViewport({ scale: 0.2 });
          const tc = document.createElement('canvas'); tc.width = vp.width; tc.height = vp.height;
          await page.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
          const td = document.createElement('div'); td.className = 'thumb';
          td.innerHTML = '<canvas width="68" height="46"></canvas>';
          td.querySelector('canvas').getContext('2d').drawImage(tc, 0, 0, 68, 46);
          td.onclick = () => switchPdfPage(i - 1);
          slider.appendChild(td); pdfPages.push({ page, vp });
        }
        currentPdfPage = 0; await renderPdfPage(0);
      };
      async function renderPdfPage(idx) {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(idx + 1);
        const scale = Math.min(WORLD_W / page.getViewport({ scale: 1 }).width, WORLD_H / page.getViewport({ scale: 1 }).height) * 0.95;
        const vp = page.getViewport({ scale }); const tc = document.createElement('canvas');
        tc.width = WORLD_W; tc.height = WORLD_H; const tctx = tc.getContext('2d');
        tctx.fillStyle = '#fff'; tctx.fillRect(0, 0, WORLD_W, WORLD_H);
        await page.render({ canvasContext: tctx, viewport: vp, transform: [1, 0, 0, 1, (WORLD_W - vp.width) / 2, (WORLD_H - vp.height) / 2] }).promise;
        pdfBgImage = new Image(); pdfBgImage.src = tc.toDataURL();
        await new Promise(r => { pdfBgImage.onload = r; });
        document.querySelectorAll('#pdf-slider .thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
        renderAll();
      }
      function switchPdfPage(idx) { if (idx !== currentPdfPage) { currentPdfPage = idx; renderPdfPage(idx); } }

      // Keyboard shortcuts
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
        if (e.key === 'p') setTool('pen');
        if (e.key === 'e') setTool('eraser');
        if (e.key === 'r' && !e.ctrlKey) { e.preventDefault(); btnRecord.onclick(); }
      });

      function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      setTool('pen');
      updateViewportIndicator();
      toast('✒️ Draw on bottom · Resize yellow box on top to zoom/pan');
    })();
  </script>
</body>
</html>
