<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Professional Whiteboard - Smooth Working</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      overflow: hidden;
    }
    /* Toolbar */
    .toolbar {
      background: #16213e;
      border-radius: 16px;
      padding: 6px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .tool-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      background: #0f3460;
      padding: 4px 10px;
      border-radius: 30px;
    }
    button, .file-label {
      background: #e94560;
      border: none;
      padding: 5px 12px;
      border-radius: 25px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 11px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    button:hover, .file-label:hover { opacity: 0.85; transform: scale(0.96); }
    button.secondary { background: #533483; }
    button.active { background: #0f3460; border: 2px solid #e94560; }
    input[type="color"] { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; cursor: pointer; background: transparent; }
    input[type="range"] { width: 80px; }
    /* Main Layout */
    .main-layout {
      display: flex;
      flex: 1;
      gap: 10px;
      min-height: 0;
    }
    .canvas-area {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .canvas-card {
      background: #1e1e2f;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }
    .card-header {
      padding: 6px 12px;
      background: #533483;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    .canvas-container {
      position: relative;
      flex: 1;
      background: #2d2d44;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    canvas {
      display: block;
      background: white;
      cursor: crosshair;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .status {
      position: absolute;
      bottom: 8px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      pointer-events: none;
    }
    /* Right Sidebar */
    .sidebar {
      width: 260px;
      background: #16213e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-title {
      background: #e94560;
      padding: 10px;
      text-align: center;
      color: white;
      font-weight: bold;
    }
    .slide-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .slide-item {
      background: #0f3460;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      color: white;
      font-size: 11px;
      transition: 0.2s;
    }
    .slide-item:hover { background: #e94560; }
    .slide-item.active { background: #e94560; border-left: 3px solid yellow; }
    .mic-status {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: #2ecc71;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      display: none;
      z-index: 1000;
    }
    .recording-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #e74c3c;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      animation: pulse 1s infinite;
      display: none;
      z-index: 1000;
    }
    @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<div class="recording-indicator" id="recIndicator">🔴 RECORDING</div>
<div id="toastMsg" class="mic-status"></div>

<div class="toolbar">
  <div class="tool-group">
    <input type="color" id="penColor" value="#000000">
    <input type="range" id="brushSize" min="2" max="30" value="4">
    <span id="sizeLabel" style="color:white;">4px</span>
  </div>
  <div class="tool-group">
    <button id="drawBtn" class="active">✏️ Draw</button>
    <button id="eraseBtn">🧽 Eraser</button>
    <button id="smartEraseBtn">🎯 Smart Erase</button>
    <button id="clearBtn">🗑️ Clear</button>
    <button id="undoBtn">↩️ Undo</button>
    <button id="redoBtn">↪️ Redo</button>
  </div>
  <div class="tool-group">
    <input type="file" id="pdfFile" accept=".pdf" style="display:none">
    <label for="pdfFile" class="file-label">📄 PDF</label>
    <input type="file" id="mcqFile" accept=".txt" style="display:none">
    <label for="mcqFile" class="file-label" style="background:#e67e22;">📝 MCQ</label>
    <input type="file" id="imgFile" accept="image/*" style="display:none">
    <label for="imgFile" class="file-label" style="background:#16a085;">🖼️ Image</label>
  </div>
  <div class="tool-group">
    <button id="fontMinusBtn">A-</button>
    <span id="fontSizeVal" style="color:white; min-width:35px;">18</span>
    <button id="fontPlusBtn">A+</button>
  </div>
  <div class="tool-group">
    <button id="recordBtn" style="background:#e74c3c;">🔴 Record</button>
    <button id="micBtn">🎙️ Mic</button>
    <button id="testBotBtn">🤖 Test</button>
  </div>
</div>

<div class="main-layout">
  <div class="canvas-area">
    <div class="canvas-card">
      <div class="card-header">📄 TOP CANVAS (Fixed View)</div>
      <div class="canvas-container" id="topContainer">
        <canvas id="topCanvas"></canvas>
        <div class="status" id="topStatus">Ready</div>
      </div>
    </div>
    <div class="canvas-card">
      <div class="card-header">✍️ BOTTOM CANVAS (Zoom + Pan + Draw)</div>
      <div class="canvas-container" id="bottomContainer">
        <canvas id="bottomCanvas"></canvas>
        <div class="status" id="bottomStatus">Zoom: 1.0x</div>
      </div>
    </div>
  </div>
  <div class="sidebar" id="sidebar" style="display: none;">
    <div class="sidebar-title">📚 MCQ SLIDES</div>
    <div class="slide-list" id="slideList"></div>
  </div>
</div>

<script>
  // ========== PDF.js setup ==========
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

  // ========== DOM Elements ==========
  const topCanvas = document.getElementById('topCanvas');
  const bottomCanvas = document.getElementById('bottomCanvas');
  let topCtx = topCanvas.getContext('2d');
  let bottomCtx = bottomCanvas.getContext('2d');

  // Layers
  let bgCanvas = document.createElement('canvas');
  let bgCtx = bgCanvas.getContext('2d');
  let drawLayerMain = document.createElement('canvas');
  let drawLayerTop = document.createElement('canvas');
  let mainDrawCtx = drawLayerMain.getContext('2d');
  let topDrawCtx = drawLayerTop.getContext('2d');

  // Drawing setup - smooth lines
  mainDrawCtx.lineCap = 'round';
  mainDrawCtx.lineJoin = 'round';
  topDrawCtx.lineCap = 'round';
  topDrawCtx.lineJoin = 'round';

  // State
  let currentTool = 'draw';
  let penColor = '#000000';
  let penSize = 4;
  let strokes = [];
  let currentStroke = [];
  let history = [];
  let historyIndex = -1;
  
  // Zoom/Pan for bottom canvas
  let scale = 1;
  let offsetX = 0, offsetY = 0;
  
  // Content
  let pdfDoc = null;
  let slides = [];
  let currentSlide = 0;
  let mcqFontSize = 18;
  
  // Images
  let images = [];
  let draggingImg = false;
  let dragImgIdx = -1;
  let dragOffsetX = 0, dragOffsetY = 0;
  
  // Drawing flags
  let drawing = false;
  let lastX = 0, lastY = 0;
  let isTap = false;
  
  // Pinch zoom
  let initialPinchDist = 0;
  let initialScale = 1;
  let initialOffsetX = 0, initialOffsetY = 0;
  
  // Recording
  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;
  let recordInterval = null;
  let micStream = null;
  let micEnabled = false;
  let recordCanvas = document.createElement('canvas');
  let recordCtx = recordCanvas.getContext('2d');

  // ========== Helper Functions ==========
  function showMsg(msg, isError = false) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.style.background = isError ? '#e74c3c' : '#2ecc71';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2500);
  }

  function setCanvasSize(w, h) {
    topCanvas.width = w; topCanvas.height = h;
    bottomCanvas.width = w; bottomCanvas.height = h;
    bgCanvas.width = w; bgCanvas.height = h;
    drawLayerMain.width = w; drawLayerMain.height = h;
    drawLayerTop.width = w; drawLayerTop.height = h;
    recordCanvas.width = w; recordCanvas.height = h;
    redrawAll();
  }

  function redrawAll() {
    // Bottom canvas with zoom
    bottomCtx.setTransform(1, 0, 0, 1, 0, 0);
    bottomCtx.clearRect(0, 0, bottomCanvas.width, bottomCanvas.height);
    bottomCtx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
    bottomCtx.drawImage(bgCanvas, 0, 0);
    bottomCtx.drawImage(drawLayerMain, 0, 0);
    
    // Top canvas fixed
    topCtx.setTransform(1, 0, 0, 1, 0, 0);
    topCtx.clearRect(0, 0, topCanvas.width, topCanvas.height);
    topCtx.drawImage(bgCanvas, 0, 0);
    topCtx.drawImage(drawLayerTop, 0, 0);
    
    document.getElementById('bottomStatus').innerHTML = `Zoom: ${scale.toFixed(2)}x`;
  }

  function saveToHistory() {
    const state = {
      mainImg: drawLayerMain.toDataURL(),
      topImg: drawLayerTop.toDataURL(),
      strokes: JSON.parse(JSON.stringify(strokes))
    };
    if (historyIndex < history.length - 1) {
      history = history.slice(0, historyIndex + 1);
    }
    history.push(state);
    historyIndex = history.length - 1;
    if (history.length > 50) {
      history.shift();
      historyIndex--;
    }
    updateUndoRedo();
  }

  function restoreHistory(state) {
    const img1 = new Image();
    img1.onload = () => {
      mainDrawCtx.clearRect(0, 0, drawLayerMain.width, drawLayerMain.height);
      mainDrawCtx.drawImage(img1, 0, 0);
      redrawAll();
    };
    img1.src = state.mainImg;
    const img2 = new Image();
    img2.onload = () => {
      topDrawCtx.clearRect(0, 0, drawLayerTop.width, drawLayerTop.height);
      topDrawCtx.drawImage(img2, 0, 0);
      redrawAll();
    };
    img2.src = state.topImg;
    strokes = state.strokes || [];
  }

  function undo() {
    if (historyIndex > 0) {
      historyIndex--;
      restoreHistory(history[historyIndex]);
    }
    updateUndoRedo();
  }

  function redo() {
    if (historyIndex < history.length - 1) {
      historyIndex++;
      restoreHistory(history[historyIndex]);
    }
    updateUndoRedo();
  }

  function updateUndoRedo() {
    document.getElementById('undoBtn').disabled = historyIndex <= 0;
    document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
  }

  function drawLine(x1, y1, x2, y2, isDot = false) {
    if (currentTool === 'draw') {
      mainDrawCtx.strokeStyle = penColor;
      mainDrawCtx.lineWidth = penSize;
      topDrawCtx.strokeStyle = penColor;
      topDrawCtx.lineWidth = penSize;
      
      mainDrawCtx.beginPath();
      mainDrawCtx.moveTo(x1, y1);
      mainDrawCtx.lineTo(x2, y2);
      mainDrawCtx.stroke();
      
      topDrawCtx.beginPath();
      topDrawCtx.moveTo(x1, y1);
      topDrawCtx.lineTo(x2, y2);
      topDrawCtx.stroke();
      
      if (isDot) {
        mainDrawCtx.fillStyle = penColor;
        topDrawCtx.fillStyle = penColor;
        mainDrawCtx.beginPath();
        mainDrawCtx.arc(x2, y2, penSize / 2, 0, Math.PI * 2);
        mainDrawCtx.fill();
        topDrawCtx.beginPath();
        topDrawCtx.arc(x2, y2, penSize / 2, 0, Math.PI * 2);
        topDrawCtx.fill();
      }
    } else if (currentTool === 'eraser') {
      mainDrawCtx.globalCompositeOperation = 'destination-out';
      topDrawCtx.globalCompositeOperation = 'destination-out';
      mainDrawCtx.lineWidth = penSize * 2;
      topDrawCtx.lineWidth = penSize * 2;
      mainDrawCtx.beginPath();
      mainDrawCtx.moveTo(x1, y1);
      mainDrawCtx.lineTo(x2, y2);
      mainDrawCtx.stroke();
      topDrawCtx.beginPath();
      topDrawCtx.moveTo(x1, y1);
      topDrawCtx.lineTo(x2, y2);
      topDrawCtx.stroke();
      mainDrawCtx.globalCompositeOperation = 'source-over';
      topDrawCtx.globalCompositeOperation = 'source-over';
    } else if (currentTool === 'smartErase') {
      const tolerance = penSize * 2;
      strokes = strokes.filter(stroke => {
        for (let p of stroke.points) {
          if (Math.hypot(p.x - x2, p.y - y2) < tolerance) return false;
        }
        return true;
      });
      redrawAllStrokes();
      saveToHistory();
    }
    redrawAll();
  }

  function redrawAllStrokes() {
    mainDrawCtx.clearRect(0, 0, drawLayerMain.width, drawLayerMain.height);
    topDrawCtx.clearRect(0, 0, drawLayerTop.width, drawLayerTop.height);
    strokes.forEach(s => {
      mainDrawCtx.strokeStyle = s.color;
      mainDrawCtx.lineWidth = s.width;
      topDrawCtx.strokeStyle = s.color;
      topDrawCtx.lineWidth = s.width;
      if (s.points.length === 1) {
        mainDrawCtx.fillStyle = s.color;
        topDrawCtx.fillStyle = s.color;
        mainDrawCtx.beginPath();
        mainDrawCtx.arc(s.points[0].x, s.points[0].y, s.width / 2, 0, Math.PI * 2);
        mainDrawCtx.fill();
        topDrawCtx.beginPath();
        topDrawCtx.arc(s.points[0].x, s.points[0].y, s.width / 2, 0, Math.PI * 2);
        topDrawCtx.fill();
      } else {
        mainDrawCtx.beginPath();
        mainDrawCtx.moveTo(s.points[0].x, s.points[0].y);
        topDrawCtx.beginPath();
        topDrawCtx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) {
          mainDrawCtx.lineTo(s.points[i].x, s.points[i].y);
          topDrawCtx.lineTo(s.points[i].x, s.points[i].y);
        }
        mainDrawCtx.stroke();
        topDrawCtx.stroke();
      }
    });
    redrawAll();
  }

  function getCanvasCoords(e) {
    const rect = bottomCanvas.getBoundingClientRect();
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX - rect.left;
      clientY = e.touches[0].clientY - rect.top;
    } else {
      clientX = e.clientX - rect.left;
      clientY = e.clientY - rect.top;
    }
    const canvasW = bottomCanvas.width;
    const canvasH = bottomCanvas.height;
    const cssW = rect.width;
    const cssH = rect.height;
    let x = (clientX / cssW) * canvasW;
    let y = (clientY / cssH) * canvasH;
    x = (x - offsetX) / scale;
    y = (y - offsetY) / scale;
    return { x: Math.max(0, Math.min(x, canvasW)), y: Math.max(0, Math.min(y, canvasH)) };
  }

  // ========== Drawing Events ==========
  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    isTap = true;
    const p = getCanvasCoords(e);
    lastX = p.x;
    lastY = p.y;
    if (currentTool !== 'smartErase') saveToHistory();
    currentStroke = [{ x: lastX, y: lastY }];
  }

  function moveDraw(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getCanvasCoords(e);
    if (isTap && Math.hypot(p.x - lastX, p.y - lastY) < 2) return;
    isTap = false;
    drawLine(lastX, lastY, p.x, p.y, false);
    currentStroke.push({ x: p.x, y: p.y });
    lastX = p.x;
    lastY = p.y;
  }

  function endDraw(e) {
    if (!drawing) return;
    e.preventDefault();
    if (isTap) {
      const p = getCanvasCoords(e);
      drawLine(p.x, p.y, p.x, p.y, true);
      currentStroke.push({ x: p.x, y: p.y });
    }
    if (currentStroke.length > 0) {
      strokes.push({
        points: [...currentStroke],
        color: penColor,
        width: penSize
      });
      saveToHistory();
    }
    drawing = false;
    currentStroke = [];
  }

  // Mouse events
  bottomCanvas.addEventListener('mousedown', startDraw);
  window.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);
  
  // Touch events
  bottomCanvas.addEventListener('touchstart', startDraw, { passive: false });
  bottomCanvas.addEventListener('touchmove', moveDraw, { passive: false });
  bottomCanvas.addEventListener('touchend', endDraw);
  
  // Pinch zoom on bottom canvas
  bottomCanvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      initialPinchDist = Math.hypot(dx, dy);
      initialScale = scale;
      const rect = bottomCanvas.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      const canvasW = bottomCanvas.width, cssW = rect.width;
      const canvasH = bottomCanvas.height, cssH = rect.height;
      const midX = (cx / cssW) * canvasW;
      const midY = (cy / cssH) * canvasH;
      initialOffsetX = offsetX;
      initialOffsetY = offsetY;
      const worldX = (midX - offsetX) / scale;
      const worldY = (midY - offsetY) / scale;
      pinchCenter = { x: worldX, y: worldY, screenX: midX, screenY: midY };
    }
  });
  
  let pinchCenter = null;
  bottomCanvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && initialPinchDist > 0) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDist = Math.hypot(dx, dy);
      const newScale = initialScale * (newDist / initialPinchDist);
      scale = Math.min(10, Math.max(0.3, newScale));
      const rect = bottomCanvas.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      const canvasW = bottomCanvas.width, cssW = rect.width;
      const canvasH = bottomCanvas.height, cssH = rect.height;
      const screenX = (cx / cssW) * canvasW;
      const screenY = (cy / cssH) * canvasH;
      offsetX = screenX - pinchCenter.x * scale;
      offsetY = screenY - pinchCenter.y * scale;
      redrawAll();
    }
  });
  
  bottomCanvas.addEventListener('touchend', (e) => {
    initialPinchDist = 0;
    pinchCenter = null;
  });

  // ========== PDF Upload ==========
  document.getElementById('pdfFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    showMsg('Loading PDF...');
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const pdfData = new Uint8Array(ev.target.result);
      pdfDoc = await pdfjsLib.getDocument(pdfData).promise;
      const page = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: 2 });
      setCanvasSize(viewport.width, viewport.height);
      bgCtx.fillStyle = 'white';
      bgCtx.fillRect(0, 0, viewport.width, viewport.height);
      await page.render({ canvasContext: bgCtx, viewport }).promise;
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      redrawAll();
      showMsg('PDF loaded! Draw on bottom canvas.');
    };
    reader.readAsArrayBuffer(file);
  });

  // ========== MCQ Parser ==========
  function parseMCQ(content) {
    const slidesData = [];
    const blocks = content.split(/###/g);
    for (let block of blocks) {
      if (!block.trim()) continue;
      const lines = block.split(/\r?\n/);
      let slide = { q: '', a: '', b: '', c: '', d: '', ans: '' };
      for (let line of lines) {
        line = line.trim();
        if (line.startsWith('|Q|')) slide.q = line.substring(3).trim();
        else if (line.startsWith('|A|')) slide.a = line.substring(3).trim();
        else if (line.startsWith('|B|')) slide.b = line.substring(3).trim();
        else if (line.startsWith('|C|')) slide.c = line.substring(3).trim();
        else if (line.startsWith('|D|')) slide.d = line.substring(3).trim();
        else if (line.startsWith('|ANS|')) slide.ans = line.substring(5).trim();
      }
      if (slide.q) slidesData.push(slide);
    }
    return slidesData;
  }

  function drawMCQ(slide, index) {
    bgCtx.fillStyle = 'white';
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    let y = 70;
    bgCtx.font = `bold ${mcqFontSize + 4}px "Segoe UI"`;
    bgCtx.fillStyle = '#1a5276';
    bgCtx.fillText(`Q${index + 1}. ${slide.q}`, 40, y);
    y += mcqFontSize + 12;
    bgCtx.font = `${mcqFontSize}px "Segoe UI"`;
    bgCtx.fillStyle = '#2c3e66';
    if (slide.a) bgCtx.fillText(`A) ${slide.a}`, 60, y);
    y += mcqFontSize + 6;
    if (slide.b) bgCtx.fillText(`B) ${slide.b}`, 60, y);
    y += mcqFontSize + 6;
    if (slide.c) bgCtx.fillText(`C) ${slide.c}`, 60, y);
    y += mcqFontSize + 6;
    if (slide.d) bgCtx.fillText(`D) ${slide.d}`, 60, y);
    y += mcqFontSize + 10;
    if (slide.ans) {
      bgCtx.font = `italic ${mcqFontSize - 2}px "Segoe UI"`;
      bgCtx.fillStyle = '#27ae60';
      bgCtx.fillText(`✓ Answer: ${slide.ans}`, 60, y);
    }
    redrawAll();
    if (window.MathJax) MathJax.typesetPromise();
  }

  function loadSlide(idx) {
    if (slides.length && idx >= 0 && idx < slides.length) {
      currentSlide = idx;
      drawMCQ(slides[currentSlide], currentSlide);
      const items = document.querySelectorAll('.slide-item');
      items.forEach((item, i) => {
        if (i === currentSlide) item.classList.add('active');
        else item.classList.remove('active');
      });
    }
  }

  document.getElementById('mcqFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      slides = parseMCQ(ev.target.result);
      if (slides.length) {
        setCanvasSize(1100, 750);
        currentSlide = 0;
        drawMCQ(slides[0], 0);
        document.getElementById('sidebar').style.display = 'flex';
        const container = document.getElementById('slideList');
        container.innerHTML = '';
        slides.forEach((s, idx) => {
          const div = document.createElement('div');
          div.className = 'slide-item' + (idx === 0 ? ' active' : '');
          div.innerHTML = `<b>${idx + 1}</b> ${s.q.substring(0, 40)}${s.q.length > 40 ? '...' : ''}`;
          div.onclick = () => loadSlide(idx);
          container.appendChild(div);
        });
        showMsg(`${slides.length} slides loaded! Click on right panel to switch.`);
      } else {
        showMsg('Invalid format! Use |Q|, |A|, |B|, |C|, |D|, |ANS| with ###', true);
      }
    };
    reader.readAsText(file);
  });

  // Font size control
  document.getElementById('fontPlusBtn').onclick = () => {
    mcqFontSize = Math.min(36, mcqFontSize + 2);
    document.getElementById('fontSizeVal').innerText = mcqFontSize;
    if (slides.length) drawMCQ(slides[currentSlide], currentSlide);
  };
  document.getElementById('fontMinusBtn').onclick = () => {
    mcqFontSize = Math.max(12, mcqFontSize - 2);
    document.getElementById('fontSizeVal').innerText = mcqFontSize;
    if (slides.length) drawMCQ(slides[currentSlide], currentSlide);
  };

  // ========== Images with Drag ==========
  function drawImages() {
    images.forEach(img => {
      [mainDrawCtx, topDrawCtx].forEach(ctx => {
        ctx.drawImage(img.img, img.x, img.y, img.w, img.h);
      });
    });
    redrawAll();
  }

  document.getElementById('imgFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      const w = 200;
      const h = (img.height / img.width) * 200;
      images.push({ img: img, x: 100, y: 100, w: w, h: h });
      drawImages();
      saveToHistory();
      showMsg('Image added! Drag to move.');
    };
    img.src = URL.createObjectURL(file);
  });

  // Drag images
  bottomCanvas.addEventListener('mousedown', (e) => {
    if (currentTool !== 'draw') return;
    const p = getCanvasCoords(e);
    for (let i = images.length - 1; i >= 0; i--) {
      const img = images[i];
      if (p.x >= img.x && p.x <= img.x + img.w && p.y >= img.y && p.y <= img.y + img.h) {
        draggingImg = true;
        dragImgIdx = i;
        dragOffsetX = p.x - img.x;
        dragOffsetY = p.y - img.y;
        e.preventDefault();
        return;
      }
    }
    draggingImg = false;
    startDraw(e);
  });

  window.addEventListener('mousemove', (e) => {
    if (draggingImg && dragImgIdx >= 0) {
      const p = getCanvasCoords(e);
      images[dragImgIdx].x = p.x - dragOffsetX;
      images[dragImgIdx].y = p.y - dragOffsetY;
      drawImages();
      e.preventDefault();
    }
  });

  window.addEventListener('mouseup', () => {
    if (draggingImg) {
      draggingImg = false;
      saveToHistory();
    }
  });

  // ========== Tool Buttons ==========
  document.getElementById('drawBtn').onclick = () => {
    currentTool = 'draw';
    document.getElementById('drawBtn').classList.add('active');
    document.getElementById('eraseBtn').classList.remove('active');
    document.getElementById('smartEraseBtn').classList.remove('active');
  };
  document.getElementById('eraseBtn').onclick = () => {
    currentTool = 'eraser';
    document.getElementById('eraseBtn').classList.add('active');
    document.getElementById('drawBtn').classList.remove('active');
    document.getElementById('smartEraseBtn').classList.remove('active');
  };
  document.getElementById('smartEraseBtn').onclick = () => {
    currentTool = 'smartErase';
    document.getElementById('smartEraseBtn').classList.add('active');
    document.getElementById('drawBtn').classList.remove('active');
    document.getElementById('eraseBtn').classList.remove('active');
  };
  document.getElementById('clearBtn').onclick = () => {
    if (confirm('Clear all drawings?')) {
      mainDrawCtx.clearRect(0, 0, drawLayerMain.width, drawLayerMain.height);
      topDrawCtx.clearRect(0, 0, drawLayerTop.width, drawLayerTop.height);
      strokes = [];
      images = [];
      saveToHistory();
      redrawAll();
    }
  };
  document.getElementById('undoBtn').onclick = undo;
  document.getElementById('redoBtn').onclick = redo;
  document.getElementById('penColor').addEventListener('input', (e) => penColor = e.target.value);
  document.getElementById('brushSize').addEventListener('input', (e) => {
    penSize = parseInt(e.target.value);
    document.getElementById('sizeLabel').innerHTML = penSize + 'px';
  });

  // ========== Telegram Recording ==========
  async function testBot() {
    try {
      const res = await fetch(`https://api.telegram.org/bot8142735342:AAHexGW7ZVeWorAb70i51P1hudv9rljUH7Q/getMe`);
      const data = await res.json();
      showMsg(data.ok ? '✅ Bot Connected' : '❌ Failed');
    } catch (e) {
      showMsg('Network error', true);
    }
  }

  async function uploadToTelegram(blob) {
    const fd = new FormData();
    fd.append('chat_id', '5229323108');
    fd.append('video', blob, `recording_${Date.now()}.webm`);
    try {
      const res = await fetch(`https://api.telegram.org/bot8142735342:AAHexGW7ZVeWorAb70i51P1hudv9rljUH7Q/sendVideo`, {
        method: 'POST',
        body: fd
      });
      return (await res.json()).ok;
    } catch (e) {
      return false;
    }
  }

  async function startRecording() {
    if (isRecording) {
      if (mediaRecorder) mediaRecorder.stop();
      if (recordInterval) clearInterval(recordInterval);
      isRecording = false;
      document.getElementById('recIndicator').style.display = 'none';
      showMsg('Recording saved');
      return;
    }
    
    let audioStream = null;
    if (micEnabled) {
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {}
    }
    
    recordCanvas.width = topCanvas.width;
    recordCanvas.height = topCanvas.height;
    const canvasStream = recordCanvas.captureStream(20);
    let finalStream = canvasStream;
    if (audioStream) {
      finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
    }
    
    mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm' });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      await uploadToTelegram(blob);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'whiteboard.webm';
      a.click();
      URL.revokeObjectURL(url);
    };
    
    recordInterval = setInterval(() => {
      recordCtx.drawImage(topCanvas, 0, 0);
    }, 40);
    
    mediaRecorder.start(500);
    isRecording = true;
    document.getElementById('recIndicator').style.display = 'block';
    showMsg('Recording... Click again to stop');
  }

  async function toggleMic() {
    if (micStream) {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
      micEnabled = false;
      showMsg('Mic disabled');
    } else {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micEnabled = true;
        showMsg('Mic enabled');
      } catch (e) {
        showMsg('Mic permission denied', true);
      }
    }
  }

  document.getElementById('recordBtn').onclick = startRecording;
  document.getElementById('micBtn').onclick = toggleMic;
  document.getElementById('testBotBtn').onclick = testBot;

  // ========== Initial Setup ==========
  setCanvasSize(1100, 700);
  saveToHistory();
  showMsg('Ready! Upload PDF or MCQ to start');
</script>
</body>
</html>
