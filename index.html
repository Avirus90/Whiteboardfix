<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EduBoard Pro | Handwriting + Vertex Edit + Zoom/Pan</title>
    <!-- PDF.js Core (Free) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* main layout: two boards (top = master, bottom = interactive) */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #0f1422;
        }

        .boards-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 16px;
            overflow: hidden;
        }

        .top-board {
            flex: 1.2;
            background: #1a1f2e;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(72, 187, 255, 0.3);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
        }

        .bottom-board {
            flex: 2;
            background: #111624;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.4);
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #ffffff;
            cursor: crosshair;
            touch-action: none;
        }

        /* floating toolbar (modern) */
        .floating-toolbar {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 8px;
            z-index: 200;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(0, 212, 255, 0.3);
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
        }

        .tool-btn {
            background: rgba(30, 45, 75, 0.8);
            border: none;
            color: #eef5ff;
            font-size: 0.85rem;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.1s;
            font-family: monospace;
        }

        .tool-btn.active {
            background: #2d7aff;
            box-shadow: 0 0 12px #2d7aff;
        }

        .tool-btn:hover {
            background: #3a5e9e;
            transform: translateY(-1px);
        }

        .color-row {
            display: inline-flex;
            gap: 6px;
            margin-left: 8px;
            background: #1e2a44;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 28px;
            cursor: pointer;
            border: 2px solid white;
        }

        .right-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: rgba(12, 18, 30, 0.9);
            backdrop-filter: blur(16px);
            border-left: 1px solid cyan;
            transform: translateX(100%);
            transition: transform 0.25s;
            z-index: 300;
            display: flex;
            flex-direction: column;
        }

        .right-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            color: #c0e0ff;
            border-bottom: 1px solid #2a3456;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px,1fr));
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
        }

        .thumb-item {
            background: #131b2f;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
        }

        .status {
            position: fixed;
            bottom: 18px;
            left: 18px;
            background: #000000aa;
            color: #ffd966;
            padding: 5px 12px;
            border-radius: 28px;
            font-size: 11px;
            z-index: 250;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 800px) {
            .tool-btn { padding: 5px 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="boards-area">
        <div class="top-board">
            <canvas id="masterCanvas"></canvas>
        </div>
        <div class="bottom-board">
            <canvas id="workCanvas"></canvas>
        </div>
    </div>
    <div class="right-panel" id="rightPanel">
        <div class="panel-header"><span>📚 RESOURCES</span><button id="closePanelBtn" style="background:none; color:white;">✕</button></div>
        <div id="panelContent" style="flex:1; overflow-y:auto; padding:12px;"></div>
    </div>
</div>

<div class="floating-toolbar" id="toolbar">
    <button class="tool-btn" data-tool="pen">✒️ Pen</button>
    <button class="tool-btn" data-tool="marker">🖌️ Marker</button>
    <button class="tool-btn" data-tool="highlighter">🟡 Highlighter</button>
    <button class="tool-btn" data-tool="eraser">🧽 Eraser</button>
    <button class="tool-btn" data-tool="smartEraser">✨ Smart Eraser</button>
    <button class="tool-btn" data-tool="select">🖱️ Select</button>
    <button class="tool-btn" data-tool="rect">⬛ Rect</button>
    <button class="tool-btn" data-tool="circle">⚪ Circle</button>
    <button class="tool-btn" data-tool="triangle">🔺 Triangle</button>
    <button class="tool-btn" data-tool="polygon">🔷 Polygon</button>
    <button class="tool-btn" data-tool="text">📝 Text</button>
    <button class="tool-btn" id="undoBtn">↩️ Undo</button>
    <button class="tool-btn" id="redoBtn">↪️ Redo</button>
    <button id="clearBtn" class="tool-btn">🗑️ Clear</button>
    <button id="vertexToggle" class="tool-btn">✏️ Vertex Edit</button>
    <div class="color-row" id="colorRow"></div>
    <input type="range" id="brushSize" min="1" max="30" value="3" style="width:70px;">
    <span id="sizeVal" style="color:white;">3px</span>
</div>
<div class="status" id="statusBar">Zoom: 1.00x | Ready | Vertex OFF</div>

<script>
    (function(){
        // ---------- DOM ----------
        const masterCanvas = document.getElementById('masterCanvas');
        const masterCtx = masterCanvas.getContext('2d');
        const workCanvas = document.getElementById('workCanvas');
        const workCtx = workCanvas.getContext('2d');

        let workWidth = 1000, workHeight = 700;
        function resizeCanvases() {
            const rectWork = workCanvas.parentElement.getBoundingClientRect();
            workCanvas.width = rectWork.width;
            workCanvas.height = rectWork.height;
            const rectTop = masterCanvas.parentElement.getBoundingClientRect();
            masterCanvas.width = rectTop.width;
            masterCanvas.height = rectTop.height;
            workWidth = workCanvas.width;
            workHeight = workCanvas.height;
            renderMaster();
            renderWork();
        }
        window.addEventListener('resize', resizeCanvases);

        // ---------- ZOOM / PAN (robust from second file) ----------
        let zoom = 1.0;
        let panX = 0, panY = 0;
        let isPanning = false;
        let panStart = { x: 0, y: 0 };

        function applyTransform(ctx) {
            ctx.setTransform(1,0,0,1,0,0);
            ctx.translate(panX, panY);
            ctx.scale(zoom, zoom);
        }
        function screenToWorld(clientX, clientY) {
            const rect = workCanvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (workCanvas.width/rect.width);
            const canvasY = (clientY - rect.top) * (workCanvas.height/rect.height);
            return { x: (canvasX - panX) / zoom, y: (canvasY - panY) / zoom };
        }
        function worldToScreen(x,y) {
            return { x: x*zoom + panX, y: y*zoom + panY };
        }

        // ---------- ELEMENTS MODEL: strokes + shapes + text + images ----------
        let elements = [];        // each { id, type, data }
        let undoStack = [], redoStack = [];
        let nextId = 1000;

        // current drawing
        let currentTool = 'pen';
        let penColor = '#000000';
        let penSize = 3;
        let highlighterColor = 'rgba(255, 235, 100, 0.55)';
        let drawing = false;
        let currentStroke = null;   // {id, type:'stroke', points:[], color, size, style}
        
        // shape temp
        let shapeStart = null;
        let currentShapeType = null;
        let customSides = 5;

        // selection & vertex edit
        let selectedId = null;
        let vertexEditMode = false;
        let dragVertexIdx = -1;
        
        // temporary drag/resize/rotate
        let dragObjStart = null, dragStartWorld = null, resizeHandle = null;
        
        // ---------- Helper: render everything ----------
        function renderWork() {
            workCtx.clearRect(0, 0, workCanvas.width, workCanvas.height);
            workCtx.save();
            applyTransform(workCtx);
            // light grid
            workCtx.strokeStyle = '#ddd';
            workCtx.lineWidth = 0.5/zoom;
            for(let i=-2000; i<=2000; i+=50){
                workCtx.beginPath(); workCtx.moveTo(i,-2000); workCtx.lineTo(i,2000); workCtx.stroke();
                workCtx.beginPath(); workCtx.moveTo(-2000,i); workCtx.lineTo(2000,i); workCtx.stroke();
            }
            for(let el of elements) drawElement(workCtx, el);
            if(selectedId !== null && !vertexEditMode) drawSelectionBox(workCtx, elements.find(e=>e.id===selectedId));
            if(vertexEditMode && selectedId !== null){
                let obj = elements.find(e=>e.id===selectedId);
                if(obj && obj.points) drawVertexHandles(workCtx, obj);
            }
            workCtx.restore();
            // update master canvas
            renderMaster();
        }

        function drawElement(ctx, el) {
            if(el.type === 'stroke') {
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = (el.style === 'highlighter') ? 0.6 : 1;
                ctx.strokeStyle = el.color;
                ctx.lineWidth = el.size;
                let pts = el.points;
                if(pts.length < 2) return;
                ctx.moveTo(pts[0].x, pts[0].y);
                for(let i=1; i<pts.length; i++) {
                    ctx.lineTo(pts[i].x, pts[i].y);
                }
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            else if(el.type === 'rect') {
                ctx.strokeStyle = el.color;
                ctx.lineWidth = el.lineWidth || 2;
                ctx.strokeRect(el.x, el.y, el.w, el.h);
            }
            else if(el.type === 'circle') {
                ctx.beginPath(); ctx.ellipse(el.cx, el.cy, el.rx, el.ry, 0, 0, 2*Math.PI); ctx.stroke();
            }
            else if(el.type === 'triangle') {
                ctx.beginPath(); ctx.moveTo(el.points[0].x, el.points[0].y); ctx.lineTo(el.points[1].x, el.points[1].y); ctx.lineTo(el.points[2].x, el.points[2].y); ctx.closePath(); ctx.stroke();
            }
            else if(el.type === 'polygon' && el.points) {
                ctx.beginPath(); ctx.moveTo(el.points[0].x, el.points[0].y);
                for(let i=1;i<el.points.length;i++) ctx.lineTo(el.points[i].x, el.points[i].y);
                ctx.closePath(); ctx.stroke();
            }
            else if(el.type === 'arrow') {
                ctx.beginPath(); ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
                let angle = Math.atan2(el.y2-el.y1, el.x2-el.x1);
                let sz = Math.min(20, Math.hypot(el.x2-el.x1, el.y2-el.y1)*0.2);
                ctx.beginPath(); ctx.moveTo(el.x2, el.y2); ctx.lineTo(el.x2 - sz*Math.cos(angle-Math.PI/6), el.y2 - sz*Math.sin(angle-Math.PI/6));
                ctx.moveTo(el.x2, el.y2); ctx.lineTo(el.x2 - sz*Math.cos(angle+Math.PI/6), el.y2 - sz*Math.sin(angle+Math.PI/6)); ctx.stroke();
            }
            else if(el.type === 'text') {
                ctx.font = `${el.fontSize || 24}px "Segoe UI"`;
                ctx.fillStyle = el.color;
                ctx.fillText(el.text, el.x, el.y);
            }
        }

        function drawSelectionBox(ctx, el) {
            let b = getBounds(el);
            ctx.save();
            ctx.strokeStyle = '#ffaa33';
            ctx.lineWidth = 2/zoom;
            ctx.setLineDash([6/zoom, 5/zoom]);
            ctx.strokeRect(b.x, b.y, b.w, b.h);
            ctx.setLineDash([]);
            // resize handles
            let hs = 12/zoom;
            ctx.fillStyle = '#ffaa33';
            [[b.x,b.y],[b.x+b.w,b.y],[b.x,b.y+b.h],[b.x+b.w,b.y+b.h]].forEach(([cx,cy])=>{ ctx.fillRect(cx-hs/2, cy-hs/2, hs, hs); });
            ctx.restore();
        }
        
        function drawVertexHandles(ctx, obj) {
            if(!obj.points) return;
            ctx.fillStyle = '#00ccff';
            for(let p of obj.points){
                ctx.beginPath(); ctx.arc(p.x, p.y, 12/zoom, 0, 2*Math.PI); ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();
            }
        }

        function getBounds(el) {
            if(el.type === 'rect') return { x: el.x, y: el.y, w: el.w, h: el.h };
            if(el.type === 'circle') return { x: el.cx - el.rx, y: el.cy - el.ry, w: el.rx*2, h: el.ry*2 };
            if(el.type === 'triangle' || el.type === 'polygon') {
                let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
                el.points.forEach(p=>{ minX=Math.min(minX,p.x); minY=Math.min(minY,p.y); maxX=Math.max(maxX,p.x); maxY=Math.max(maxY,p.y); });
                return { x: minX, y: minY, w: maxX-minX, h: maxY-minY };
            }
            if(el.type === 'arrow') return { x: Math.min(el.x1,el.x2), y: Math.min(el.y1,el.y2), w: Math.abs(el.x2-el.x1), h: Math.abs(el.y2-el.y1) };
            if(el.type === 'text') return { x: el.x-20, y: el.y-25, w: 120, h: 40 };
            return { x:0,y:0,w:50,h:50 };
        }

        function renderMaster() {
            masterCtx.clearRect(0,0,masterCanvas.width, masterCanvas.height);
            masterCtx.drawImage(workCanvas, 0, 0, masterCanvas.width, masterCanvas.height);
        }

        // ---------- History ----------
        function saveHistory() {
            undoStack.push(JSON.parse(JSON.stringify(elements)));
            redoStack = [];
        }
        function undo() { if(undoStack.length) { redoStack.push(JSON.parse(JSON.stringify(elements))); elements = undoStack.pop(); renderWork(); } }
        function redo() { if(redoStack.length) { undoStack.push(JSON.parse(JSON.stringify(elements))); elements = redoStack.pop(); renderWork(); } }
        function addElement(el, record=true) {
            if(record) saveHistory();
            elements.push(el);
            renderWork();
        }
        function updateElement(id, props) {
            let idx = elements.findIndex(e=>e.id===id);
            if(idx!==-1) { elements[idx] = {...elements[idx], ...props}; renderWork(); }
        }
        function deleteElement(id) { saveHistory(); elements = elements.filter(e=>e.id!==id); if(selectedId===id) selectedId=null; renderWork(); }

        // ---------- Drawing Logic (improved smooth handwriting) ----------
        function startDraw(e) {
            let p = getWorldCoords(e);
            if(!p) return;
            if(currentTool === 'pen' || currentTool === 'marker' || currentTool === 'highlighter') {
                drawing = true;
                let color = (currentTool === 'highlighter') ? highlighterColor : penColor;
                let sz = (currentTool === 'marker') ? penSize*1.4 : penSize;
                currentStroke = { id: nextId++, type: 'stroke', points: [p], color: color, size: sz, style: currentTool };
                addElement(currentStroke, true);
            }
            else if(currentTool === 'eraser') {
                let hit = findHitElement(p);
                if(hit) deleteElement(hit.id);
            }
            else if(currentTool === 'smartEraser') {
                let toDelete = elements.filter(el => distanceToElement(p, el) < 18);
                if(toDelete.length) { saveHistory(); elements = elements.filter(el => !toDelete.includes(el)); renderWork(); }
            }
            else if(['rect','circle','triangle','polygon','arrow'].includes(currentTool)) {
                shapeStart = p;
                currentShapeType = currentTool;
                drawing = true;
            }
            else if(currentTool === 'text') {
                let txt = prompt("Enter text:", "New Text");
                if(txt) {
                    let newText = { id: nextId++, type: 'text', text: txt, x: p.x, y: p.y, fontSize: 24, color: penColor };
                    addElement(newText);
                }
            }
        }

        function continueDraw(e) {
            let p = getWorldCoords(e);
            if(!p) return;
            if(drawing && currentStroke && (currentTool === 'pen' || currentTool === 'marker' || currentTool === 'highlighter')) {
                currentStroke.points.push(p);
                updateElement(currentStroke.id, { points: currentStroke.points });
            }
            else if(drawing && shapeStart && currentShapeType) {
                // preview: live draw on temp layer - we do full redraw and draw preview
                renderWork();
                workCtx.save(); applyTransform(workCtx);
                workCtx.strokeStyle = penColor;
                workCtx.lineWidth = penSize;
                let w = p.x - shapeStart.x, h = p.y - shapeStart.y;
                if(currentShapeType === 'rect') workCtx.strokeRect(shapeStart.x, shapeStart.y, w, h);
                else if(currentShapeType === 'circle') { workCtx.beginPath(); workCtx.ellipse(shapeStart.x+w/2, shapeStart.y+h/2, Math.abs(w)/2, Math.abs(h)/2,0,0,2*Math.PI); workCtx.stroke(); }
                else if(currentShapeType === 'triangle') { let cx=shapeStart.x+w/2; workCtx.beginPath(); workCtx.moveTo(cx, shapeStart.y); workCtx.lineTo(shapeStart.x, shapeStart.y+h); workCtx.lineTo(shapeStart.x+w, shapeStart.y+h); workCtx.closePath(); workCtx.stroke(); }
                else if(currentShapeType === 'polygon') { let sides=customSides, cx=shapeStart.x+w/2, cy=shapeStart.y+h/2, rad=Math.min(Math.abs(w),Math.abs(h))/2; let pts=[]; for(let i=0;i<sides;i++){ let ang=i*2*Math.PI/sides - Math.PI/2; pts.push({x:cx+rad*Math.cos(ang), y:cy+rad*Math.sin(ang)}); } workCtx.beginPath(); workCtx.moveTo(pts[0].x,pts[0].y); for(let i=1;i<pts.length;i++) workCtx.lineTo(pts[i].x,pts[i].y); workCtx.closePath(); workCtx.stroke(); }
                else if(currentShapeType === 'arrow') { workCtx.beginPath(); workCtx.moveTo(shapeStart.x, shapeStart.y); workCtx.lineTo(p.x, p.y); workCtx.stroke(); let ang=Math.atan2(h,w), sz=Math.min(20, Math.hypot(w,h)*0.2); workCtx.beginPath(); workCtx.moveTo(p.x,p.y); workCtx.lineTo(p.x - sz*Math.cos(ang-Math.PI/6), p.y - sz*Math.sin(ang-Math.PI/6)); workCtx.moveTo(p.x,p.y); workCtx.lineTo(p.x - sz*Math.cos(ang+Math.PI/6), p.y - sz*Math.sin(ang+Math.PI/6)); workCtx.stroke(); }
                workCtx.restore();
            }
        }

        function endDraw(e) {
            if(drawing && shapeStart && currentShapeType) {
                let p = getWorldCoords(e);
                if(p && Math.hypot(p.x-shapeStart.x, p.y-shapeStart.y) > 5) {
                    let w = p.x - shapeStart.x, h = p.y - shapeStart.y;
                    let newObj = { id: nextId++, color: penColor, lineWidth: penSize };
                    if(currentShapeType === 'rect') newObj = {...newObj, type:'rect', x: Math.min(shapeStart.x,p.x), y: Math.min(shapeStart.y,p.y), w: Math.abs(w), h: Math.abs(h)};
                    else if(currentShapeType === 'circle') newObj = {...newObj, type:'circle', cx: shapeStart.x+w/2, cy: shapeStart.y+h/2, rx: Math.abs(w)/2, ry: Math.abs(h)/2};
                    else if(currentShapeType === 'triangle') newObj = {...newObj, type:'triangle', points: [{x:shapeStart.x+w/2, y:shapeStart.y}, {x:shapeStart.x, y:shapeStart.y+h}, {x:shapeStart.x+w, y:shapeStart.y+h}]};
                    else if(currentShapeType === 'polygon') { let sides=customSides, cx=shapeStart.x+w/2, cy=shapeStart.y+h/2, rad=Math.min(Math.abs(w),Math.abs(h))/2; let pts=[]; for(let i=0;i<sides;i++){ let ang=i*2*Math.PI/sides - Math.PI/2; pts.push({x:cx+rad*Math.cos(ang), y:cy+rad*Math.sin(ang)}); } newObj = {...newObj, type:'polygon', points: pts}; }
                    else if(currentShapeType === 'arrow') newObj = {...newObj, type:'arrow', x1:shapeStart.x, y1:shapeStart.y, x2:p.x, y2:p.y};
                    addElement(newObj);
                }
                shapeStart = null;
            }
            drawing = false;
            currentStroke = null;
            renderWork();
        }

        function getWorldCoords(e) {
            let clientX, clientY;
            if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else { clientX = e.clientX; clientY = e.clientY; }
            return screenToWorld(clientX, clientY);
        }

        function findHitElement(p) {
            for(let i=elements.length-1; i>=0; i--) {
                let b = getBounds(elements[i]);
                if(p.x >= b.x && p.x <= b.x+b.w && p.y >= b.y && p.y <= b.y+b.h) return elements[i];
            }
            return null;
        }
        function distanceToElement(p, el) { let b=getBounds(el); let cx=b.x+b.w/2, cy=b.y+b.h/2; return Math.hypot(p.x-cx, p.y-cy); }

        // ---------- Vertex Edit ----------
        function handleVertexDrag(e) {
            if(!vertexEditMode || selectedId===null) return false;
            let p = getWorldCoords(e);
            let obj = elements.find(o=>o.id===selectedId);
            if(obj && obj.points && dragVertexIdx !== -1) {
                obj.points[dragVertexIdx] = { x: p.x, y: p.y };
                updateElement(selectedId, { points: obj.points });
                renderWork();
                return true;
            }
            return false;
        }

        // ---------- Zoom & Pan Events ----------
        workCanvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            let delta = -e.deltaY * 0.008;
            let newZoom = Math.min(20, Math.max(0.2, zoom * (1+delta)));
            let rect = workCanvas.getBoundingClientRect();
            let mouseX = (e.clientX - rect.left) * (workCanvas.width/rect.width);
            let mouseY = (e.clientY - rect.top) * (workCanvas.height/rect.height);
            let worldBefore = screenToWorld(e.clientX, e.clientY);
            zoom = newZoom;
            let worldAfter = screenToWorld(e.clientX, e.clientY);
            panX += (worldAfter.x - worldBefore.x) * zoom;
            panY += (worldAfter.y - worldBefore.y) * zoom;
            renderWork();
            document.getElementById('statusBar').innerHTML = `Zoom: ${zoom.toFixed(2)}x | Vertex ${vertexEditMode?'ON':'OFF'}`;
        }, {passive: false});
        
        workCanvas.addEventListener('mousedown', (e) => {
            if(e.button === 2) { isPanning=true; panStart={x:e.clientX, y:e.clientY}; e.preventDefault(); return; }
            if(vertexEditMode && selectedId !== null) {
                let p = getWorldCoords(e);
                let obj = elements.find(o=>o.id===selectedId);
                if(obj && obj.points) {
                    for(let i=0;i<obj.points.length;i++){
                        if(Math.hypot(p.x-obj.points[i].x, p.y-obj.points[i].y) < 18/zoom){
                            dragVertexIdx = i;
                            return;
                        }
                    }
                }
            }
            if(currentTool === 'select') {
                let p = getWorldCoords(e);
                let hit = findHitElement(p);
                if(hit) { selectedId = hit.id; renderWork(); dragObjStart = {x:p.x, y:p.y}; }
                else selectedId = null;
                renderWork();
                return;
            }
            startDraw(e);
        });
        workCanvas.addEventListener('mousemove', (e) => {
            if(isPanning) {
                let dx = e.clientX - panStart.x, dy = e.clientY - panStart.y;
                panX += dx; panY += dy;
                panStart = {x:e.clientX, y:e.clientY};
                renderWork();
                return;
            }
            if(handleVertexDrag(e)) return;
            if(drawing) continueDraw(e);
        });
        window.addEventListener('mouseup', () => { isPanning=false; if(drawing) endDraw(); dragVertexIdx = -1; });
        
        // Touch with pinch zoom
        let initialDist=0, initialZoom=1, initialPan={x:0,y:0};
        workCanvas.addEventListener('touchstart', (e) => {
            if(e.touches.length===2){
                let dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
                initialDist=Math.hypot(dx,dy); initialZoom=zoom; initialPan={x:panX,y:panY};
                e.preventDefault();
            } else if(e.touches.length===1){
                startDraw(e);
            }
        });
        workCanvas.addEventListener('touchmove', (e) => {
            if(e.touches.length===2 && initialDist>0){
                let dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
                let newDist=Math.hypot(dx,dy); let scale=newDist/initialDist;
                zoom=Math.min(20,Math.max(0.2, initialZoom*scale));
                let midX=(e.touches[0].clientX+e.touches[1].clientX)/2, midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
                let worldBefore=screenToWorld(midX,midY);
                panX=initialPan.x; panY=initialPan.y;
                let worldAfter=screenToWorld(midX,midY);
                panX+=(worldAfter.x-worldBefore.x)*zoom; panY+=(worldAfter.y-worldBefore.y)*zoom;
                renderWork(); e.preventDefault();
            } else if(e.touches.length===1 && drawing){ continueDraw(e); e.preventDefault();}
        });
        workCanvas.addEventListener('touchend', (e) => { endDraw(e); dragVertexIdx=-1; });
        workCanvas.addEventListener('contextmenu', e=>e.preventDefault());

        // ---------- UI Bindings ----------
        const tools = ['pen','marker','highlighter','eraser','smartEraser','select','rect','circle','triangle','polygon','arrow','text'];
        tools.forEach(t=>{
            let btn = document.querySelector(`[data-tool="${t}"]`);
            if(btn) btn.onclick = () => { currentTool = t; document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(t==='polygon') customSides = parseInt(prompt("Sides (3-12)",5))||5; renderWork(); };
        });
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('redoBtn').onclick = redo;
        document.getElementById('clearBtn').onclick = () => { saveHistory(); elements = []; selectedId=null; renderWork(); };
        document.getElementById('vertexToggle').onclick = () => { vertexEditMode = !vertexEditMode; document.getElementById('statusBar').innerHTML = `Zoom: ${zoom.toFixed(2)}x | Vertex ${vertexEditMode?'ON':'OFF'}`; renderWork(); };
        let brushSize = document.getElementById('brushSize');
        brushSize.oninput = (e) => { penSize = +e.target.value; document.getElementById('sizeVal').innerText = penSize+'px'; };
        let colorRow = document.getElementById('colorRow');
        ['#000000','#e74c3c','#2d7aff','#2ecc71','#f1c40f','#9b59b6'].forEach(c=>{
            let sw = document.createElement('div'); sw.className='color-swatch'; sw.style.backgroundColor=c; sw.onclick=()=>{ penColor=c; };
            colorRow.appendChild(sw);
        });
        // PDF load
        let pdfDoc=null;
        async function loadPDF(file){
            let arr = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({data:arr}).promise;
            let page = await pdfDoc.getPage(1);
            let viewport = page.getViewport({scale:1.2});
            masterCanvas.width = viewport.width; masterCanvas.height = viewport.height;
            await page.render({canvasContext: masterCtx, viewport}).promise;
        }
        document.getElementById('closePanelBtn').onclick = () => document.getElementById('rightPanel').classList.remove('open');
        let panelBtn = document.createElement('button'); panelBtn.innerText='📁'; panelBtn.className='tool-btn'; panelBtn.onclick=()=>document.getElementById('rightPanel').classList.toggle('open');
        document.getElementById('toolbar').appendChild(panelBtn);
        let pdfUpload = document.createElement('input'); pdfUpload.type='file'; pdfUpload.accept='application/pdf'; pdfUpload.style.display='none'; pdfUpload.onchange=e=>loadPDF(e.target.files[0]);
        let pdfLabel = document.createElement('button'); pdfLabel.innerText='📄 PDF'; pdfLabel.className='tool-btn'; pdfLabel.onclick=()=>pdfUpload.click();
        document.getElementById('toolbar').appendChild(pdfLabel, pdfUpload);
        document.body.appendChild(pdfUpload);
        
        resizeCanvases();
        renderWork();
        saveHistory();
    })();
</script>
</body>
</html>
