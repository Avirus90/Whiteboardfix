<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pro Whiteboard · Tablet Ready</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
  </script>
  <style>
    :root {
      --bg: #0f1219;
      --surface: #1a1f2e;
      --surface2: #222940;
      --accent: #4b8eff;
      --danger: #f24e4e;
      --text: #e8ecf2;
      --text2: #94a3b8;
      --border: #2a3348;
      --radius: 14px;
      --radius-sm: 10px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #070a10;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ═══════════ TOOLBAR ═══════════ */
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(15, 18, 25, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 50;
      min-height: 52px;
    }
    .tool-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .tool-btn {
      background: var(--surface2);
      border: 1px solid transparent;
      color: var(--text);
      padding: 9px 15px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      letter-spacing: 0.01em;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:active {
      transform: scale(0.95);
    }
    .tool-btn.active {
      background: var(--accent);
      border-color: #7db4ff;
      color: #fff;
      box-shadow: 0 0 18px rgba(75, 142, 255, 0.4);
    }
    .tool-btn.danger-active {
      background: var(--danger);
      border-color: #ff6b6b;
      color: #fff;
      box-shadow: 0 0 18px rgba(242, 78, 78, 0.4);
    }
    .tool-btn.recording {
      background: #e02424;
      border-color: #ff5252;
      color: #fff;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,
      100% {
        box-shadow: 0 0 8px rgba(224, 36, 36, 0.5);
      }
      50% {
        box-shadow: 0 0 26px rgba(224, 36, 36, 0.9);
      }
    }
    input[type="color"] {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #fff;
      background: transparent;
      padding: 1px;
      flex-shrink: 0;
    }
    input[type="range"] {
      width: 60px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .sep {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 5px;
      border-radius: 1px;
    }
    .tool-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin: 0 2px;
      white-space: nowrap;
    }

    /* ═══════════ BOARDS ═══════════ */
    #boards-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
    }
    .top-board {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(75, 142, 255, 0.25);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .bottom-board {
      flex: 1.6;
      background: #0c1019;
      border-radius: var(--radius);
      border: 1px solid rgba(120, 130, 255, 0.25);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .canvas-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      background: #fff;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 2px;
    }
    #topCanvas {
      cursor: default;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }
    #bottomCanvas {
      touch-action: none;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    #viewport-indicator {
      position: absolute;
      border: 2px dashed rgba(255, 180, 60, 0.7);
      background: rgba(255, 180, 60, 0.08);
      pointer-events: none;
      border-radius: 3px;
      z-index: 10;
    }

    /* ═══════════ PDF SLIDER ═══════════ */
    #pdf-slider {
      background: #0d1119;
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      min-height: 56px;
    }
    .thumb {
      width: 68px;
      height: 46px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      background: #fff;
      flex-shrink: 0;
      transition: 0.15s;
    }
    .thumb:active {
      transform: scale(0.93);
    }
    .thumb.active {
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(75, 142, 255, 0.5);
    }
    .thumb canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ═══════════ LATEX MODAL ═══════════ */
    #latex-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #latex-modal.show {
      display: flex;
    }
    .modal-box {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius);
      width: 440px;
      max-width: 94vw;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }
    .modal-box h3 {
      color: var(--text);
      margin: 0 0 14px;
      font-size: 15px;
    }
    textarea {
      width: 100%;
      background: #111827;
      color: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
    }

    /* ═══════════ TOAST ═══════════ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      color: #fff;
      padding: 10px 26px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
    }
    .toast.show {
      opacity: 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3a4460;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- ═══════════ TOOLBAR ═══════════ -->
  <div id="toolbar">
    <span class="tool-label">Tools</span>
    <div class="tool-group">
      <button class="tool-btn active" id="btn-pen">✒️ Pen</button>
      <button class="tool-btn" id="btn-eraser">🧹 Eraser</button>
      <button class="tool-btn" id="btn-stroke-eraser">✂️ Stroke</button>
      <button class="tool-btn" id="btn-pan">🤚 Pan</button>
      <button class="tool-btn" id="btn-edit">🔧 Edit</button>
    </div>
    <div class="sep"></div>
    <span class="tool-label">Color</span>
    <input type="color" id="penColor" value="#1e293b">
    <span class="tool-label">Size</span>
    <input type="range" id="penSize" min="1" max="16" value="3">
    <span style="color:var(--text2);font-size:12px;min-width:28px;" id="sizeLabel">3px</span>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-undo">↩ Undo</button>
    <button class="tool-btn" id="btn-redo">↪ Redo</button>
    <button class="tool-btn" id="btn-clear">🗑 Clear</button>
    <div class="sep"></div>
    <span class="tool-label">Insert</span>
    <button class="tool-btn" id="btn-shape-rect">▭</button>
    <button class="tool-btn" id="btn-shape-circle">○</button>
    <button class="tool-btn" id="btn-shape-triangle">△</button>
    <button class="tool-btn" id="btn-shape-line">╱</button>
    <button class="tool-btn" id="btn-image">🖼 Img</button>
    <button class="tool-btn" id="btn-latex">📐 LaTeX</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-record">🎤 Rec</button>
    <span style="color:var(--text2);font-size:11px;min-width:38px;" id="recStatus">Off</span>
    <button class="tool-btn" id="btn-pdf-upload">📄 PDF</button>
    <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
  </div>

  <!-- ═══════════ PDF SLIDER ═══════════ -->
  <div id="pdf-slider"></div>

  <!-- ═══════════ BOARDS ═══════════ -->
  <div id="boards-container">
    <div class="top-board">
      <div class="canvas-wrapper" id="topWrapper">
        <canvas id="topCanvas"></canvas>
        <div id="viewport-indicator"></div>
      </div>
    </div>
    <div class="bottom-board">
      <div class="canvas-wrapper" id="bottomWrapper">
        <canvas id="bottomCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- ═══════════ LATEX MODAL ═══════════ -->
  <div id="latex-modal">
    <div class="modal-box">
      <h3>📐 Enter LaTeX Equation</h3>
      <textarea id="latexInput" rows="3" placeholder="\frac{-b \pm \sqrt{b^2 - 4ac}}{2a}"></textarea>
      <div id="latexPreview" style="min-height:38px;margin:10px 0;padding:8px;background:#111827;border-radius:8px;color:#fff;text-align:center;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="tool-btn" id="latexCancel">Cancel</button>
        <button class="tool-btn" id="latexInsert" style="background:var(--accent);color:#fff;border-color:var(--accent);">Insert</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ TOAST ═══════════ -->
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // ═══════════════════════════════════════
      // DOM REFS
      // ═══════════════════════════════════════
      const topCanvas = document.getElementById('topCanvas');
      const topCtx = topCanvas.getContext('2d');
      const bottomCanvas = document.getElementById('bottomCanvas');
      const bottomCtx = bottomCanvas.getContext('2d');
      const topWrapper = document.getElementById('topWrapper');
      const bottomWrapper = document.getElementById('bottomWrapper');
      const viewportIndicator = document.getElementById('viewport-indicator');
      const btnRecord = document.getElementById('btn-record');
      const recStatus = document.getElementById('recStatus');

      // ═══════════════════════════════════════
      // CONSTANTS & STATE
      // ═══════════════════════════════════════
      const WORLD_W = 1280;
      const WORLD_H = 720;
      let displayW, displayH;

      // View transform (only bottom canvas)
      let zoom = 2.2;
      let panX = 0,
        panY = 0;

      // Content
      let strokes = [];
      let shapes = [];
      let images = [];
      let latexItems = [];
      let nextId = 1;

      // History
      const MAX_HISTORY = 60;
      let undoStack = [];
      let redoStack = [];

      // Tools
      let currentTool = 'pen';
      let editMode = false;
      let penColor = '#1e293b';
      let penSize = 3;
      let isDrawing = false;
      let currentStroke = null;

      // Edit mode
      let selectedItem = null;
      let editDragMode = null;
      let editStart = { x: 0, y: 0 };
      let editItemStart = null;

      // PDF
      let pdfDoc = null;
      let pdfPages = [];
      let currentPdfPage = 0;
      let pdfBgImage = null;

      // Recording
      let mediaRecorder = null;
      let recordedChunks = [];
      let isRecording = false;
      let audioStream = null;

      // ═══════════════════════════════════════
      // TOUCH STATE — THE KEY TO RELIABILITY
      // ═══════════════════════════════════════
      let isPinching = false;
      let pinchStartDist = 0;
      let pinchStartZoom = 1;
      let pinchStartPan = { x: 0, y: 0 };
      let pinchAnchor = { x: 0, y: 0 }; // world coords that stay fixed during zoom
      let lastPinchMidSX = 0,
        lastPinchMidSY = 0; // screen coords for pan tracking

      // ═══════════════════════════════════════
      // RESIZE — both canvases IDENTICAL size
      // ═══════════════════════════════════════
      function resizeCanvases() {
        const topRect = topWrapper.getBoundingClientRect();
        const bottomRect = bottomWrapper.getBoundingClientRect();
        const maxW = Math.min(topRect.width, bottomRect.width);
        const maxH = Math.min(topRect.height, bottomRect.height);
        if (maxW / maxH > WORLD_W / WORLD_H) {
          displayH = maxH;
          displayW = displayH * (WORLD_W / WORLD_H);
        } else {
          displayW = maxW;
          displayH = displayW / (WORLD_W / WORLD_H);
        }
        topCanvas.width = WORLD_W;
        topCanvas.height = WORLD_H;
        topCanvas.style.width = displayW + 'px';
        topCanvas.style.height = displayH + 'px';
        bottomCanvas.width = WORLD_W;
        bottomCanvas.height = WORLD_H;
        bottomCanvas.style.width = displayW + 'px';
        bottomCanvas.style.height = displayH + 'px';
        clampPan();
        renderAll();
      }

      function clampPan() {
        const vw = WORLD_W / zoom;
        const vh = WORLD_H / zoom;
        panX = Math.min(0, Math.max(-WORLD_W + vw, panX));
        panY = Math.min(0, Math.max(-WORLD_H + vh, panY));
        if (vw >= WORLD_W) panX = (WORLD_W - vw) / 2;
        if (vh >= WORLD_H) panY = (WORLD_H - vh) / 2;
      }

      window.addEventListener('resize', resizeCanvases);
      resizeCanvases();

      // ═══════════════════════════════════════
      // HISTORY
      // ═══════════════════════════════════════
      function saveState() {
        undoStack.push({
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(i => ({ ...i, imgElement: null })),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        });
        if (undoStack.length > MAX_HISTORY) undoStack.shift();
        redoStack = [];
      }

      function undo() {
        if (!undoStack.length) return;
        redoStack.push(snapshotState());
        restoreState(undoStack.pop());
        renderAll();
      }

      function redo() {
        if (!redoStack.length) return;
        undoStack.push(snapshotState());
        restoreState(redoStack.pop());
        renderAll();
      }

      function snapshotState() {
        return {
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(i => ({ ...i, imgElement: null })),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        };
      }

      function restoreState(state) {
        strokes = state.strokes;
        shapes = state.shapes;
        const imgMap = new Map(images.map(i => [i.id, i.imgElement]));
        images = state.images.map(p => ({ ...p, imgElement: imgMap.get(p.id) }));
        latexItems = state.latexItems;
      }

      // ═══════════════════════════════════════
      // RENDERING
      // ═══════════════════════════════════════
      function renderAll() { renderTop();
        renderBottom();
        updateViewportIndicator(); }

      function renderTop() {
        topCtx.clearRect(0, 0, WORLD_W, WORLD_H);
        topCtx.fillStyle = '#fff';
        topCtx.fillRect(0, 0, WORLD_W, WORLD_H);
        if (pdfBgImage) topCtx.drawImage(pdfBgImage, 0, 0, WORLD_W, WORLD_H);
        drawContent(topCtx);
      }

      function renderBottom() {
        bottomCtx.clearRect(0, 0, WORLD_W, WORLD_H);
        bottomCtx.fillStyle = '#fff';
        bottomCtx.fillRect(0, 0, WORLD_W, WORLD_H);
        bottomCtx.save();
        bottomCtx.translate(panX, panY);
        bottomCtx.scale(zoom, zoom);
        if (pdfBgImage) {
          bottomCtx.globalAlpha = 0.5;
          bottomCtx.drawImage(pdfBgImage, 0, 0, WORLD_W, WORLD_H);
          bottomCtx.globalAlpha = 1;
        }
        drawContent(bottomCtx);
        bottomCtx.restore();
        drawGrid();
        bottomCtx.strokeStyle = '#aaa';
        bottomCtx.lineWidth = 1.5;
        bottomCtx.strokeRect(0, 0, WORLD_W, WORLD_H);
      }

      function drawContent(ctx) {
        // Strokes
        for (const s of strokes) {
          ctx.save();
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          if (s.type === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
          } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = s.color;
          }
          ctx.lineWidth = s.size;
          if (s.points.length >= 2) {
            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (let i = 1; i < s.points.length; i++) {
              const p = s.points[i - 1],
                c = s.points[i];
              ctx.quadraticCurveTo(p.x, p.y, (p.x + c.x) / 2, (p.y + c.y) / 2);
            }
            ctx.lineTo(s.points[s.points.length - 1].x, s.points[s.points.length - 1].y);
            ctx.stroke();
          } else if (s.points.length === 1) {
            ctx.beginPath();
            ctx.arc(s.points[0].x, s.points[0].y, s.size / 2, 0, Math.PI * 2);
            ctx.fillStyle = s.type === 'eraser' ? '#000' : s.color;
            ctx.fill();
          }
          ctx.restore();
        }
        // Shapes
        for (const sh of shapes) {
          ctx.save();
          const cx = sh.x + sh.w / 2,
            cy = sh.y + sh.h / 2;
          ctx.translate(cx, cy);
          ctx.rotate((sh.rotation || 0) * Math.PI / 180);
          ctx.translate(-cx, -cy);
          ctx.strokeStyle = sh.color || penColor;
          ctx.fillStyle = sh.fill || 'transparent';
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          if (sh.type === 'rect') ctx.roundRect(sh.x, sh.y, sh.w, sh.h, 6);
          else if (sh.type === 'circle') ctx.ellipse(cx, cy, sh.w / 2, sh.h / 2, 0, 0, Math.PI * 2);
          else if (sh.type === 'triangle') { ctx.moveTo(cx, sh.y);
            ctx.lineTo(sh.x + sh.w, sh.y + sh.h);
            ctx.lineTo(sh.x, sh.y + sh.h);
            ctx.closePath(); } else if (sh.type === 'line') { ctx.moveTo(sh.x, sh.y);
            ctx.lineTo(sh.x + sh.w, sh.y + sh.h); }
          ctx.fill();
          ctx.stroke();
          if (sh.selected && editMode) {
            ctx.strokeStyle = '#4b8eff';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.strokeRect(sh.x - 6, sh.y - 6, sh.w + 12, sh.h + 12);
            ctx.setLineDash([]);
          }
          ctx.restore();
        }
        // Images
        for (const img of images) {
          ctx.save();
          const cx = img.x + img.w / 2,
            cy = img.y + img.h / 2;
          ctx.translate(cx, cy);
          ctx.rotate((img.rotation || 0) * Math.PI / 180);
          ctx.translate(-cx, -cy);
          ctx.drawImage(img.imgElement, img.x, img.y, img.w, img.h);
          if (img.selected && editMode) {
            ctx.strokeStyle = '#4b8eff';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.strokeRect(img.x - 4, img.y - 4, img.w + 8, img.h + 8);
            ctx.setLineDash([]);
          }
          ctx.restore();
        }
        // LaTeX
        for (const lt of latexItems) {
          ctx.save();
          const cx = lt.x + lt.w / 2,
            cy = lt.y + lt.h / 2;
          ctx.translate(cx, cy);
          ctx.rotate((lt.rotation || 0) * Math.PI / 180);
          ctx.translate(-cx, -cy);
          if (lt.cachedImg) ctx.drawImage(lt.cachedImg, lt.x, lt.y, lt.w, lt.h);
          if (lt.selected && editMode) {
            ctx.strokeStyle = '#4b8eff';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.strokeRect(lt.x - 4, lt.y - 4, lt.w + 8, lt.h + 8);
            ctx.setLineDash([]);
          }
          ctx.restore();
        }
      }

      function drawGrid() {
        const spacing = 40;
        bottomCtx.strokeStyle = '#dde4f0';
        bottomCtx.lineWidth = 0.4;
        bottomCtx.beginPath();
        const sx = -panX % (spacing * zoom);
        const sy = -panY % (spacing * zoom);
        for (let x = sx; x <= WORLD_W * zoom; x += spacing * zoom) { bottomCtx.moveTo(x, 0);
          bottomCtx.lineTo(x, WORLD_H * zoom); }
        for (let y = sy; y <= WORLD_H * zoom; y += spacing * zoom) { bottomCtx.moveTo(0, y);
          bottomCtx.lineTo(WORLD_W * zoom, y); }
        bottomCtx.stroke();
      }

      function updateViewportIndicator() {
        const vw = WORLD_W / zoom,
          vh = WORLD_H / zoom;
        const sx = displayW / WORLD_W,
          sy = displayH / WORLD_H;
        viewportIndicator.style.left = (-panX * sx) + 'px';
        viewportIndicator.style.top = (-panY * sy) + 'px';
        viewportIndicator.style.width = (vw * sx) + 'px';
        viewportIndicator.style.height = (vh * sy) + 'px';
      }

      // ═══════════════════════════════════════
      // COORDINATE CONVERSION
      // ═══════════════════════════════════════
      function clientToScreen(clientX, clientY) {
        const rect = bottomCanvas.getBoundingClientRect();
        return {
          sx: (clientX - rect.left) * (WORLD_W / rect.width),
          sy: (clientY - rect.top) * (WORLD_H / rect.height)
        };
      }

      function screenToWorld(sx, sy) {
        return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
      }

      function clientToWorld(clientX, clientY) {
        const sc = clientToScreen(clientX, clientY);
        return screenToWorld(sc.sx, sc.sy);
      }

      // ═══════════════════════════════════════
      // CANCEL ANY ONGOING DRAWING
      // ═══════════════════════════════════════
      function cancelDrawing() {
        if (isDrawing && currentStroke) {
          isDrawing = false;
          currentStroke = null;
        }
        if (window._drawingShape) {
          shapes.pop();
          window._drawingShape = null;
        }
      }

      // ═══════════════════════════════════════
      // TOUCH EVENTS — For ALL mobile interaction
      // ═══════════════════════════════════════
      bottomCanvas.addEventListener('touchstart', function(e) {
        e.preventDefault();

        if (e.touches.length === 2) {
          // ══ PINCH START ══
          isPinching = true;
          cancelDrawing();
          isDrawing = false;
          currentStroke = null;

          const t1 = e.touches[0];
          const t2 = e.touches[1];
          pinchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          pinchStartZoom = zoom;
          pinchStartPan = { x: panX, y: panY };

          // Anchor point: midpoint in screen coords → world coords (stays fixed)
          const mid = clientToScreen((t1.clientX + t2.clientX) / 2, (t1.clientY + t2.clientY) / 2);
          lastPinchMidSX = mid.sx;
          lastPinchMidSY = mid.sy;
          pinchAnchor = screenToWorld(mid.sx, mid.sy);

          renderAll();
          return;
        }

        if (e.touches.length === 1 && !isPinching) {
          // ══ SINGLE TOUCH — Start drawing ══
          const t = e.touches[0];
          handleDrawingStart(t.clientX, t.clientY);
        }
      }, { passive: false });

      bottomCanvas.addEventListener('touchmove', function(e) {
        e.preventDefault();

        if (isPinching && e.touches.length === 2) {
          // ══ PINCH + PAN ══
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          const mid = clientToScreen((t1.clientX + t2.clientX) / 2, (t1.clientY + t2.clientY) / 2);

          // Pan: move with midpoint delta (in screen coords)
          const dx = mid.sx - lastPinchMidSX;
          const dy = mid.sy - lastPinchMidSY;
          panX += dx;
          panY += dy;

          // Zoom: scale from start, anchor stays fixed
          if (pinchStartDist > 0) {
            const scale = dist / pinchStartDist;
            zoom = Math.min(8, Math.max(0.5, pinchStartZoom * scale));

            // Adjust pan to keep pinchAnchor at same screen position
            const wa = screenToWorld(
              lastPinchMidSX + dx, // current midpoint screen x
              lastPinchMidSY + dy // current midpoint screen y
            );
            // We want pinchAnchor to stay at its screen position
            // screenToWorld(sx, sy) should equal pinchAnchor
            // sx = (pinchAnchor.x * zoom + panX), sy = (pinchAnchor.y * zoom + panY)
            // We need to solve for panX, panY that keep pinchAnchor at the midpoint screen position
            panX = mid.sx - pinchAnchor.x * zoom;
            panY = mid.sy - pinchAnchor.y * zoom;
          }

          lastPinchMidSX = mid.sx;
          lastPinchMidSY = mid.sy;
          clampPan();
          renderAll();
          return;
        }

        if (!isPinching && e.touches.length === 1 && isDrawing) {
          // ══ SINGLE TOUCH DRAW ══
          const t = e.touches[0];
          handleDrawingMove(t.clientX, t.clientY);
        }
      }, { passive: false });

      bottomCanvas.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) {
          isPinching = false;
          pinchStartDist = 0;
        }
        if (e.touches.length === 0) {
          // All fingers lifted
          if (isDrawing) {
            isDrawing = false;
            currentStroke = null;
            renderAll();
          }
          if (window._drawingShape) {
            const shape = window._drawingShape;
            if (shape.w < 5 || shape.h < 5) shapes.pop();
            window._drawingShape = null;
            renderAll();
          }
        }
      });

      bottomCanvas.addEventListener('touchcancel', function(e) {
        isPinching = false;
        isDrawing = false;
        currentStroke = null;
        pinchStartDist = 0;
        if (window._drawingShape) { shapes.pop();
          window._drawingShape = null; }
        renderAll();
      });

      // ═══════════════════════════════════════
      // POINTER EVENTS — Mouse ONLY
      // ═══════════════════════════════════════
      bottomCanvas.addEventListener('pointerdown', function(e) {
        // IGNORE all touch events — they're handled by touch events
        if (e.pointerType !== 'mouse') return;
        if (isPinching) return;
        e.preventDefault();
        handleDrawingStart(e.clientX, e.clientY);
        // Also handle pan for mouse middle-click
        if (e.button === 1) startMousePan(e);
      });

      bottomCanvas.addEventListener('pointermove', function(e) {
        if (e.pointerType !== 'mouse') return;
        if (isPinching) return;
        e.preventDefault();
        if (isPanning) {
          panX = panStartPan.x + (e.clientX - panStartMouse.x);
          panY = panStartPan.y + (e.clientY - panStartMouse.y);
          clampPan();
          renderAll();
          return;
        }
        if (isDrawing && currentStroke) {
          handleDrawingMove(e.clientX, e.clientY);
        }
        if (window._drawingShape) {
          updateShapeDraw(e.clientX, e.clientY);
        }
      });

      window.addEventListener('pointerup', function(e) {
        if (e.pointerType !== 'mouse') return;
        if (isPinching) return;
        if (isPanning) { isPanning = false;
          bottomCanvas.style.cursor = currentTool === 'pan' ? 'grab' : (editMode ? 'default' : 'crosshair'); return; }
        if (isDrawing) { isDrawing = false;
          currentStroke = null;
          renderAll(); }
        if (window._drawingShape) {
          const shape = window._drawingShape;
          if (shape.w < 5 || shape.h < 5) shapes.pop();
          window._drawingShape = null;
          renderAll();
        }
      });

      // Mouse pan
      let isPanning = false;
      let panStartMouse = { x: 0, y: 0 };
      let panStartPan = { x: 0, y: 0 };

      function startMousePan(e) {
        isPanning = true;
        panStartMouse = { x: e.clientX, y: e.clientY };
        panStartPan = { x: panX, y: panY };
        bottomCanvas.style.cursor = 'grabbing';
      }

      // ═══════════════════════════════════════
      // DRAWING HANDLERS (shared by touch & mouse)
      // ═══════════════════════════════════════
      function handleDrawingStart(clientX, clientY) {
        const world = clientToWorld(clientX, clientY);

        if (currentTool === 'pan') {
          isPanning = true;
          panStartMouse = { x: clientX, y: clientY };
          panStartPan = { x: panX, y: panY };
          bottomCanvas.style.cursor = 'grabbing';
          return;
        }

        if (editMode && currentTool === 'edit') {
          const hit = hitTest(world.x, world.y);
          if (hit) {
            selectItem(hit);
            editDragMode = 'move';
            editStart = { x: clientX, y: clientY };
            const item = getSelectedItem();
            if (item) editItemStart = { x: item.x, y: item.y };
          } else {
            deselectAll();
            renderAll();
          }
          return;
        }

        if (currentTool === 'pen' || currentTool === 'eraser') {
          saveState();
          isDrawing = true;
          currentStroke = {
            id: nextId++,
            type: currentTool === 'eraser' ? 'eraser' : 'pen',
            points: [{ x: world.x, y: world.y }],
            color: currentTool === 'eraser' ? '#000' : penColor,
            size: currentTool === 'eraser' ? 22 : penSize
          };
          strokes.push(currentStroke);
          renderAll();
        } else if (currentTool === 'strokeEraser') {
          const idx = strokes.findIndex(s => s.type !== 'eraser' && pointNearStroke(world, s, 18));
          if (idx !== -1) { saveState();
            strokes.splice(idx, 1);
            renderAll(); }
        } else if (currentTool.startsWith('shape-')) {
          saveState();
          const type = currentTool.replace('shape-', '');
          const shape = {
            id: nextId++,
            type,
            x: world.x,
            y: world.y,
            w: 0,
            h: 0,
            rotation: 0,
            color: penColor,
            fill: 'transparent',
            selected: false
          };
          shapes.push(shape);
          isDrawing = false;
          window._drawingShape = shape;
        }
      }

      function handleDrawingMove(clientX, clientY) {
        if (editDragMode && selectedItem) {
          const dx = (clientX - editStart.x) / zoom;
          const dy = (clientY - editStart.y) / zoom;
          const item = getSelectedItem();
          if (item && editItemStart) {
            item.x = editItemStart.x + dx;
            item.y = editItemStart.y + dy;
          }
          renderAll();
          return;
        }
        if (isDrawing && currentStroke) {
          currentStroke.points.push(clientToWorld(clientX, clientY));
          renderAll();
        }
      }

      function updateShapeDraw(clientX, clientY) {
        const world = clientToWorld(clientX, clientY);
        const shape = window._drawingShape;
        if (!shape) return;
        shape.x = Math.min(shape.x, world.x);
        shape.y = Math.min(shape.y, world.y);
        shape.w = Math.abs(world.x - shape.x);
        shape.h = Math.abs(world.y - shape.y);
        renderAll();
      }

      // Wheel zoom (mouse only, blocked during pinch)
      bottomCanvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        if (isPinching) return;
        const sc = clientToScreen(e.clientX, e.clientY);
        const wb = screenToWorld(sc.sx, sc.sy);
        zoom = Math.min(8, Math.max(0.5, zoom * (1 - e.deltaY * 0.005)));
        const wa = screenToWorld(sc.sx, sc.sy);
        panX += (wa.x - wb.x) * zoom;
        panY += (wa.y - wb.y) * zoom;
        clampPan();
        renderAll();
      }, { passive: false });

      // ═══════════════════════════════════════
      // HIT TEST & SELECTION
      // ═══════════════════════════════════════
      function hitTest(wx, wy) {
        for (let i = shapes.length - 1; i >= 0; i--) { const s = shapes[i]; if (wx >= s.x - 8 && wx <= s.x + s.w + 8 &&
            wy >= s.y - 8 && wy <= s.y + s.h + 8) return { type: 'shape', index: i }; }
        for (let i = images.length - 1; i >= 0; i--) { const im = images[i]; if (wx >= im.x && wx <= im.x + im.w && wy >=
            im.y && wy <= im.y + im.h) return { type: 'image', index: i }; }
        for (let i = latexItems.length - 1; i >= 0; i--) { const lt = latexItems[i]; if (wx >= lt.x && wx <= lt.x + lt.w &&
            wy >= lt.y && wy <= lt.y + lt.h) return { type: 'latex', index: i }; }
        return null;
      }

      function selectItem(hit) {
        deselectAll();
        selectedItem = hit;
        if (hit.type === 'shape') shapes[hit.index].selected = true;
        if (hit.type === 'image') images[hit.index].selected = true;
        if (hit.type === 'latex') latexItems[hit.index].selected = true;
        renderAll();
      }

      function deselectAll() {
        shapes.forEach(s => s.selected = false);
        images.forEach(i => i.selected = false);
        latexItems.forEach(l => l.selected = false);
        selectedItem = null;
        renderAll();
      }

      function getSelectedItem() {
        if (!selectedItem) return null;
        if (selectedItem.type === 'shape') return shapes[selectedItem.index];
        if (selectedItem.type === 'image') return images[selectedItem.index];
        if (selectedItem.type === 'latex') return latexItems[selectedItem.index];
        return null;
      }

      function pointNearStroke(p, s, t) { return s.points.some(pt => Math.hypot(pt.x - p.x, pt.y - p.y) < t); }

      // ═══════════════════════════════════════
      // TOOLBAR
      // ═══════════════════════════════════════
      function setTool(tool) {
        currentTool = tool;
        editMode = (tool === 'edit');
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active', 'danger-active'));
        const map = {
          pen: 'btn-pen',
          eraser: 'btn-eraser',
          strokeEraser: 'btn-stroke-eraser',
          pan: 'btn-pan',
          edit: 'btn-edit',
          'shape-rect': 'btn-shape-rect',
          'shape-circle': 'btn-shape-circle',
          'shape-triangle': 'btn-shape-triangle',
          'shape-line': 'btn-shape-line'
        };
        const bid = map[tool];
        if (bid) document.getElementById(bid).classList.add(tool === 'eraser' || tool === 'strokeEraser' ?
          'danger-active' : 'active');
        bottomCanvas.style.cursor = (tool === 'pan') ? 'grab' : (editMode ? 'default' : 'crosshair');
        if (!editMode) deselectAll();
        cancelDrawing();
        isDrawing = false;
        currentStroke = null;
        if (window._drawingShape) { shapes.pop();
          window._drawingShape = null; }
        renderAll();
      }

      document.getElementById('btn-pen').onclick = () => setTool('pen');
      document.getElementById('btn-eraser').onclick = () => setTool('eraser');
      document.getElementById('btn-stroke-eraser').onclick = () => setTool('strokeEraser');
      document.getElementById('btn-pan').onclick = () => setTool('pan');
      document.getElementById('btn-edit').onclick = () => setTool('edit');
      document.getElementById('btn-shape-rect').onclick = () => setTool('shape-rect');
      document.getElementById('btn-shape-circle').onclick = () => setTool('shape-circle');
      document.getElementById('btn-shape-triangle').onclick = () => setTool('shape-triangle');
      document.getElementById('btn-shape-line').onclick = () => setTool('shape-line');
      document.getElementById('btn-undo').onclick = undo;
      document.getElementById('btn-redo').onclick = redo;
      document.getElementById('btn-clear').onclick = () => {
        if (confirm('Clear all annotations?')) { saveState();
          strokes = [];
          shapes = [];
          images = [];
          latexItems = [];
          renderAll(); }
      };
      document.getElementById('penColor').oninput = e => penColor = e.target.value;
      document.getElementById('penSize').oninput = e => {
        penSize = parseInt(e.target.value);
        document.getElementById('sizeLabel').textContent = penSize + 'px';
      };

      // Image upload
      document.getElementById('btn-image').onclick = () => {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*';
        inp.onchange = (e) => {
          const f = e.target.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
              saveState();
              const h = 140,
                w = h * (img.width / img.height);
              images.push({
                id: nextId++,
                imgElement: img,
                x: WORLD_W / 2 - w / 2,
                y: WORLD_H / 2 - h / 2,
                w,
                h,
                rotation: 0,
                selected: false
              });
              renderAll();
            };
            img.src = ev.target.result;
          };
          r.readAsDataURL(f);
        };
        inp.click();
      };

      // LaTeX
      document.getElementById('btn-latex').onclick = () => document.getElementById('latex-modal').classList.add(
      'show');
      document.getElementById('latexCancel').onclick = () => document.getElementById('latex-modal').classList.remove(
        'show');
      document.getElementById('latexInsert').onclick = () => {
        const tex = document.getElementById('latexInput').value.trim();
        if (!tex) return;
        const temp = document.createElement('div');
        temp.style.cssText = 'position:absolute;left:-9999px;';
        temp.innerHTML = '\\[' + tex + '\\]';
        document.body.appendChild(temp);
        MathJax.typesetPromise([temp]).then(() => {
          const svg = temp.querySelector('svg');
          if (svg) {
            const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
              saveState();
              const h = 55,
                w = h * (img.width / img.height);
              const cached = new Image();
              cached.src = url;
              latexItems.push({
                id: nextId++,
                cachedImg: cached,
                x: WORLD_W / 2 - w / 2,
                y: WORLD_H / 2 - h / 2,
                w,
                h,
                rotation: 0,
                selected: false
              });
              renderAll();
            };
            img.src = url;
          }
          document.body.removeChild(temp);
        });
        document.getElementById('latex-modal').classList.remove('show');
      };

      // Recording
      async function startRecording() {
        if (isRecording) return;
        try { audioStream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => null); } catch (
          e) { audioStream = null; }
        const canvasStream = topCanvas.captureStream(30);
        const tracks = [...canvasStream.getVideoTracks()];
        if (audioStream) tracks.push(...audioStream.getAudioTracks());
        mediaRecorder = new MediaRecorder(new MediaStream(tracks), { mimeType: 'video/webm' });
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'whiteboard-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.webm';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          if (audioStream) { audioStream.getTracks().forEach(t => t.stop());
            audioStream = null; }
          toast('✅ Recording saved!');
        };
        mediaRecorder.start();
        isRecording = true;
        btnRecord.classList.add('recording');
        btnRecord.textContent = '⏹ Stop';
        recStatus.textContent = '🔴 Rec';
        recStatus.style.color = '#f24e4e';
        toast('🔴 Recording started');
      }

      function stopRecording() {
        if (!isRecording || !mediaRecorder || mediaRecorder.state !== 'recording') return;
        mediaRecorder.stop();
        isRecording = false;
        btnRecord.classList.remove('recording');
        btnRecord.textContent = '🎤 Rec';
        recStatus.textContent = 'Off';
        recStatus.style.color = 'var(--text2)';
      }
      btnRecord.onclick = () => { if (isRecording) stopRecording();
        else startRecording(); };

      // PDF
      document.getElementById('btn-pdf-upload').onclick = () => document.getElementById('pdfFileInput').click();
      document.getElementById('pdfFileInput').onchange = async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const data = await f.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data }).promise;
        pdfPages = [];
        const slider = document.getElementById('pdf-slider');
        slider.innerHTML = '';
        slider.style.display = 'flex';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          const page = await pdfDoc.getPage(i);
          const vp = page.getViewport({ scale: 0.2 });
          const tc = document.createElement('canvas');
          tc.width = vp.width;
          tc.height = vp.height;
          await page.render({ canvasContext: tc.getContext('2d'), viewport: vp }).promise;
          const td = document.createElement('div');
          td.className = 'thumb';
          td.innerHTML = '<canvas width="68" height="46"></canvas>';
          td.querySelector('canvas').getContext('2d').drawImage(tc, 0, 0, 68, 46);
          td.onclick = () => switchPdfPage(i - 1);
          slider.appendChild(td);
          pdfPages.push({ page, vp });
        }
        currentPdfPage = 0;
        await renderPdfPage(0);
      };

      async function renderPdfPage(idx) {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(idx + 1);
        const scale = Math.min(WORLD_W / page.getViewport({ scale: 1 }).width, WORLD_H / page.getViewport({ scale: 1 })
          .height) * 0.95;
        const vp = page.getViewport({ scale });
        const tc = document.createElement('canvas');
        tc.width = WORLD_W;
        tc.height = WORLD_H;
        const tctx = tc.getContext('2d');
        tctx.fillStyle = '#fff';
        tctx.fillRect(0, 0, WORLD_W, WORLD_H);
        await page.render({
          canvasContext: tctx,
          viewport: vp,
          transform: [1, 0, 0, 1, (WORLD_W - vp.width) / 2, (WORLD_H - vp.height) / 2]
        }).promise;
        pdfBgImage = new Image();
        pdfBgImage.src = tc.toDataURL();
        await new Promise(r => { pdfBgImage.onload = r; });
        document.querySelectorAll('#pdf-slider .thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
        renderAll();
      }

      function switchPdfPage(idx) { if (idx !== currentPdfPage) { currentPdfPage = idx;
          renderPdfPage(idx); } }

      // Keyboard
      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault();
          undo(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault();
          redo(); }
        if (e.key === 'p') setTool('pen');
        if (e.key === 'e') setTool('eraser');
        if (e.key === ' ') { e.preventDefault();
          setTool('pan'); }
        if (e.key === 'r' && !e.ctrlKey) { e.preventDefault();
          btnRecord.onclick(); }
      });

      function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      }

      // ═══════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      setTool('pen');
      toast('✅ Tablet ready · 1 finger draw · 2 finger pinch+pan');
    })();
  </script>
</body>
</html>
