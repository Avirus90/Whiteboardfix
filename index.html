<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ultimate Whiteboard Pro | PDF + MCQ + Images + Smooth Drawing</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], processEscapes: true },
      startup: { ready: true }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow: hidden;
    }
    .toolbar {
      background: #16213e;
      border-radius: 20px;
      padding: 8px 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .tool-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      background: #0f3460;
      padding: 5px 12px;
      border-radius: 40px;
    }
    button, .file-label {
      background: #e94560;
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    button:hover, .file-label:hover { filter: brightness(0.9); transform: scale(0.97); }
    button.secondary { background: #533483; }
    button.active { background: #0f3460; border: 2px solid #e94560; }
    input[type="color"] { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
    input[type="range"] { width: 100px; }
    .board-container {
      display: flex;
      flex: 1;
      gap: 12px;
      min-height: 0;
      position: relative;
    }
    .canvas-area {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .board-card {
      background: #1e1e2f;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }
    .board-header {
      padding: 8px 15px;
      background: #533483;
      color: white;
      font-weight: bold;
      font-size: 13px;
    }
    .canvas-holder {
      position: relative;
      flex: 1;
      background: #2d2d44;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    canvas {
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background: white;
      cursor: crosshair;
    }
    .status-badge {
      position: absolute;
      bottom: 10px;
      right: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      pointer-events: none;
    }
    /* Right Sidebar for Slides */
    .slide-sidebar {
      width: 280px;
      background: #16213e;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 12px;
      background: #e94560;
      color: white;
      font-weight: bold;
      text-align: center;
    }
    .slide-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .slide-item {
      background: #0f3460;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      font-size: 12px;
    }
    .slide-item:hover { background: #e94560; transform: scale(1.02); }
    .slide-item.active { background: #e94560; border-left: 4px solid yellow; }
    .font-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f3460;
      padding: 5px 10px;
      border-radius: 30px;
    }
    .recording-indicator {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #e74c3c;
      color: white;
      padding: 5px 15px;
      border-radius: 30px;
      animation: pulse 1s infinite;
      display: none;
      z-index: 1500;
    }
    @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    .mic-status {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: #2ecc71;
      color: white;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 11px;
      display: none;
      z-index: 1500;
    }
  </style>
</head>
<body>

<div class="recording-indicator" id="recIndicator">🔴 RECORDING</div>
<div id="micStatusToast" class="mic-status"></div>

<div class="toolbar">
  <div class="tool-group">
    <input type="color" id="penColor" value="#000000">
    <input type="range" id="brushWidth" min="1" max="40" value="4">
    <span id="sizeLabel" style="color:white;">4px</span>
  </div>
  <div class="tool-group">
    <button id="drawModeBtn" class="active">✏️ Draw</button>
    <button id="eraserBtn">🧽 Eraser</button>
    <button id="smartEraseBtn">🎯 Smart Erase</button>
    <button id="clearAllBtn" class="secondary">🗑️ Clear</button>
    <button id="undoBtn" class="secondary">↩️ Undo</button>
    <button id="redoBtn" class="secondary">↪️ Redo</button>
  </div>
  <div class="tool-group">
    <input type="file" id="pdfUpload" accept=".pdf" style="display:none">
    <label for="pdfUpload" class="file-label">📄 PDF</label>
    <input type="file" id="quizUpload" accept=".txt" style="display:none">
    <label for="quizUpload" class="file-label" style="background:#e67e22;">📝 MCQ Slides</label>
    <input type="file" id="imageUpload" accept="image/*" style="display:none">
    <label for="imageUpload" class="file-label" style="background:#16a085;">🖼️ Add Image</label>
  </div>
  <div class="tool-group">
    <div class="font-control">
      <span style="color:white;">🔤 MCQ Font:</span>
      <button id="fontMinus" class="secondary" style="padding:2px 8px;">A-</button>
      <span id="fontSizeDisplay" style="color:white; min-width:40px;">18px</span>
      <button id="fontPlus" class="secondary" style="padding:2px 8px;">A+</button>
    </div>
  </div>
  <div class="tool-group">
    <button id="recordBtn" class="danger-btn">🔴 Record + Telegram</button>
    <button id="testTelegramBtn" class="telegram-btn">🤖 Test Bot</button>
    <button id="toggleMicBtn" class="telegram-btn">🎙️ Mic</button>
  </div>
</div>

<div class="board-container">
  <div class="canvas-area">
    <div class="board-card">
      <div class="board-header">📄 TOP: Fixed View (PDF/MCQ/Images + Drawing)</div>
      <div class="canvas-holder" id="topHolder">
        <canvas id="topCanvas"></canvas>
        <div class="status-badge" id="topStatus">Fixed View</div>
      </div>
    </div>
    <div class="board-card">
      <div class="board-header">✍️ BOTTOM: Zoomable Canvas (Pinch 0.2x–12x • Pan • Draw)</div>
      <div class="canvas-holder" id="mainHolder">
        <canvas id="mainCanvas"></canvas>
        <div class="status-badge" id="mainStatus">Zoom + Draw</div>
      </div>
    </div>
  </div>
  
  <!-- Right Sidebar for Slides -->
  <div class="slide-sidebar" id="slideSidebar" style="display:none;">
    <div class="sidebar-header">📚 MCQ SLIDES</div>
    <div class="slide-list" id="slideList"></div>
  </div>
</div>

<script>
  // ========== TELEGRAM ==========
  const TELEGRAM = { BOT_TOKEN: '8142735342:AAHexGW7ZVeWorAb70i51P1hudv9rljUH7Q', CHAT_ID: '5229323108' };
  
  // ========== CANVAS REFERENCES ==========
  const topCanvas = document.getElementById('topCanvas');
  const mainCanvas = document.getElementById('mainCanvas');
  let topCtx = topCanvas.getContext('2d');
  let mainCtx = mainCanvas.getContext('2d');
  
  // LAYERS
  let backgroundCanvas = document.createElement('canvas');
  let bgCtx = backgroundCanvas.getContext('2d');
  let drawingLayerMain = document.createElement('canvas');
  let drawingLayerTop = document.createElement('canvas');
  let mainDrawCtx = drawingLayerMain.getContext('2d');
  let topDrawCtx = drawingLayerTop.getContext('2d');
  
  // Improve drawing quality
  mainDrawCtx.lineCap = 'round';
  mainDrawCtx.lineJoin = 'round';
  topDrawCtx.lineCap = 'round';
  topDrawCtx.lineJoin = 'round';
  
  // Drawing data
  let currentStrokes = [];
  let currentStrokePoints = [];
  let historyStack = []; let historyIndex = -1;
  let currentTool = 'draw';
  let penColor = '#000000';
  let penSize = 4;
  
  // Transform for bottom canvas
  let scale = 1, offsetX = 0, offsetY = 0;
  
  // Content
  let contentType = 'none';
  let pdfDoc = null;
  let slides = [];
  let currentSlideIndex = 0;
  let mcqFontSize = 18;
  
  // Images with drag support
  let images = [];
  let selectedImageIndex = -1;
  let isDraggingImage = false;
  let dragStart = {x:0, y:0};
  
  // Drawing flags
  let isDrawing = false, lastPoint = {x:0,y:0}, isTap = false;
  let pinchDist = 0, pinchMid = {x:0,y:0};
  
  // Recording
  let mediaRecorder = null, recordedChunks = [], isRecording = false;
  let recordingInterval = null;
  let micStream = null, isMicEnabled = false;
  const hiddenRecordCanvas = document.createElement('canvas');
  let hiddenRecordCtx = hiddenRecordCanvas.getContext('2d');
  
  // ========== UTILITIES ==========
  function showToast(msg, isError=false) {
    const toast = document.getElementById('micStatusToast');
    toast.textContent = msg;
    toast.style.background = isError ? '#e74c3c' : '#2ecc71';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
  
  function setCanvasSize(w, h) {
    topCanvas.width = w; topCanvas.height = h;
    mainCanvas.width = w; mainCanvas.height = h;
    backgroundCanvas.width = w; backgroundCanvas.height = h;
    drawingLayerMain.width = w; drawingLayerMain.height = h;
    drawingLayerTop.width = w; drawingLayerTop.height = h;
    hiddenRecordCanvas.width = w; hiddenRecordCanvas.height = h;
    redrawAll();
  }
  
  function redrawAll() {
    // Bottom with zoom
    mainCtx.setTransform(1,0,0,1,0,0);
    mainCtx.clearRect(0,0, mainCanvas.width, mainCanvas.height);
    mainCtx.setTransform(scale,0,0,scale,offsetX,offsetY);
    mainCtx.drawImage(backgroundCanvas, 0, 0);
    mainCtx.drawImage(drawingLayerMain, 0, 0);
    
    // Top fixed
    topCtx.setTransform(1,0,0,1,0,0);
    topCtx.clearRect(0,0, topCanvas.width, topCanvas.height);
    topCtx.drawImage(backgroundCanvas, 0, 0);
    topCtx.drawImage(drawingLayerTop, 0, 0);
    
    document.getElementById('mainStatus').innerHTML = `Zoom: ${scale.toFixed(2)}x`;
  }
  
  function getCanvasCoords(e) {
    const rect = mainCanvas.getBoundingClientRect();
    const clientX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const clientY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const canvasW = mainCanvas.width, canvasH = mainCanvas.height;
    const cssW = rect.width, cssH = rect.height;
    let canvasX = (clientX / cssW) * canvasW;
    let canvasY = (clientY / cssH) * canvasH;
    canvasX = (canvasX - offsetX) / scale;
    canvasY = (canvasY - offsetY) / scale;
    return { x: Math.max(0, Math.min(canvasX, canvasW)), y: Math.max(0, Math.min(canvasY, canvasH)) };
  }
  
  function saveHistory() {
    const state = {
      mainImg: drawingLayerMain.toDataURL(),
      topImg: drawingLayerTop.toDataURL(),
      strokes: JSON.parse(JSON.stringify(currentStrokes))
    };
    if(historyIndex < historyStack.length-1) historyStack = historyStack.slice(0, historyIndex+1);
    historyStack.push(state);
    historyIndex = historyStack.length-1;
    if(historyStack.length > 50) { historyStack.shift(); historyIndex--; }
    updateUndoRedo();
  }
  
  function restoreFromHistory(state) {
    const mainImg = new Image(); 
    mainImg.onload = () => { mainDrawCtx.clearRect(0,0, drawingLayerMain.width, drawingLayerMain.height); mainDrawCtx.drawImage(mainImg,0,0); redrawAll(); };
    mainImg.src = state.mainImg;
    const topImg = new Image(); 
    topImg.onload = () => { topDrawCtx.clearRect(0,0, drawingLayerTop.width, drawingLayerTop.height); topDrawCtx.drawImage(topImg,0,0); redrawAll(); };
    topImg.src = state.topImg;
    currentStrokes = state.strokes || [];
  }
  
  function undo() { if(historyIndex>0) { historyIndex--; restoreFromHistory(historyStack[historyIndex]); } updateUndoRedo(); }
  function redo() { if(historyIndex<historyStack.length-1) { historyIndex++; restoreFromHistory(historyStack[historyIndex]); } updateUndoRedo(); }
  function updateUndoRedo() { document.getElementById('undoBtn').disabled = historyIndex<=0; document.getElementById('redoBtn').disabled = historyIndex>=historyStack.length-1; }
  
  function drawStroke(from, to, isDot=false) {
    if(currentTool === 'draw') {
      mainDrawCtx.strokeStyle = penColor; mainDrawCtx.lineWidth = penSize; mainDrawCtx.lineCap='round'; mainDrawCtx.lineJoin='round';
      topDrawCtx.strokeStyle = penColor; topDrawCtx.lineWidth = penSize; topDrawCtx.lineCap='round'; topDrawCtx.lineJoin='round';
      mainDrawCtx.beginPath(); mainDrawCtx.moveTo(from.x,from.y); mainDrawCtx.lineTo(to.x,to.y); mainDrawCtx.stroke();
      topDrawCtx.beginPath(); topDrawCtx.moveTo(from.x,from.y); topDrawCtx.lineTo(to.x,to.y); topDrawCtx.stroke();
      if(isDot) {
        mainDrawCtx.fillStyle = penColor; topDrawCtx.fillStyle = penColor;
        mainDrawCtx.beginPath(); mainDrawCtx.arc(to.x,to.y,penSize/2,0,Math.PI*2); mainDrawCtx.fill();
        topDrawCtx.beginPath(); topDrawCtx.arc(to.x,to.y,penSize/2,0,Math.PI*2); topDrawCtx.fill();
      }
    } else if(currentTool === 'eraser') {
      mainDrawCtx.globalCompositeOperation = 'destination-out'; topDrawCtx.globalCompositeOperation = 'destination-out';
      mainDrawCtx.lineWidth = penSize*2; topDrawCtx.lineWidth = penSize*2;
      mainDrawCtx.beginPath(); mainDrawCtx.moveTo(from.x,from.y); mainDrawCtx.lineTo(to.x,to.y); mainDrawCtx.stroke();
      topDrawCtx.beginPath(); topDrawCtx.moveTo(from.x,from.y); topDrawCtx.lineTo(to.x,to.y); topDrawCtx.stroke();
      mainDrawCtx.globalCompositeOperation = 'source-over'; topDrawCtx.globalCompositeOperation = 'source-over';
    } else if(currentTool === 'smartErase') {
      const tolerance = penSize * 2;
      currentStrokes = currentStrokes.filter(stroke => {
        for(let p of stroke.points) {
          if(Math.hypot(p.x - to.x, p.y - to.y) < tolerance) return false;
        }
        return true;
      });
      redrawAllStrokes();
      saveHistory();
    }
    redrawAll();
  }
  
  function redrawAllStrokes() {
    mainDrawCtx.clearRect(0,0, drawingLayerMain.width, drawingLayerMain.height);
    topDrawCtx.clearRect(0,0, drawingLayerTop.width, drawingLayerTop.height);
    currentStrokes.forEach(s => {
      mainDrawCtx.strokeStyle = s.color; mainDrawCtx.lineWidth = s.width;
      topDrawCtx.strokeStyle = s.color; topDrawCtx.lineWidth = s.width;
      mainDrawCtx.beginPath(); mainDrawCtx.moveTo(s.points[0].x, s.points[0].y);
      topDrawCtx.beginPath(); topDrawCtx.moveTo(s.points[0].x, s.points[0].y);
      for(let i=1;i<s.points.length;i++) {
        mainDrawCtx.lineTo(s.points[i].x, s.points[i].y);
        topDrawCtx.lineTo(s.points[i].x, s.points[i].y);
      }
      mainDrawCtx.stroke(); topDrawCtx.stroke();
    });
    redrawAll();
  }
  
  function finalizeStroke() {
    if(currentStrokePoints.length === 0) return;
    currentStrokes.push({ points: [...currentStrokePoints], color: penColor, width: penSize, isDot: currentStrokePoints.length===1 });
    saveHistory();
    currentStrokePoints = [];
  }
  
  // ========== PDF (High Quality) ==========
  document.getElementById('pdfUpload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const pdfData = new Uint8Array(ev.target.result);
      pdfDoc = await pdfjsLib.getDocument(pdfData).promise;
      const page = await pdfDoc.getPage(1);
      // Use 2.5x scale for high resolution
      const viewport = page.getViewport({ scale: 2.5 });
      setCanvasSize(viewport.width, viewport.height);
      bgCtx.fillStyle = 'white'; bgCtx.fillRect(0,0,viewport.width,viewport.height);
      await page.render({ canvasContext: bgCtx, viewport }).promise;
      contentType = 'pdf';
      document.getElementById('slideSidebar').style.display = 'none';
      // Reset transform for both canvases to show full PDF
      scale = 1; offsetX = 0; offsetY = 0;
      redrawAll();
      showToast('PDF loaded (high quality)! You can draw on top.');
    };
    reader.readAsArrayBuffer(file);
  });
  
  // ========== MCQ SLIDES ==========
  function parseSlides(content) {
    const rawSlides = content.split(/###/g);
    const slidesData = [];
    for(let slideContent of rawSlides) {
      if(!slideContent.trim()) continue;
      const lines = slideContent.split(/\r?\n/);
      let slide = { q: '', a: '', b: '', c: '', d: '', ans: '' };
      for(let line of lines) {
        line = line.trim();
        if(line.startsWith('|Q|')) slide.q = line.substring(3).trim();
        else if(line.startsWith('|A|')) slide.a = line.substring(3).trim();
        else if(line.startsWith('|B|')) slide.b = line.substring(3).trim();
        else if(line.startsWith('|C|')) slide.c = line.substring(3).trim();
        else if(line.startsWith('|D|')) slide.d = line.substring(3).trim();
        else if(line.startsWith('|ANS|')) slide.ans = line.substring(5).trim();
      }
      if(slide.q) slidesData.push(slide);
    }
    return slidesData;
  }
  
  function drawSlideOnBackground(slide, index) {
    bgCtx.fillStyle = 'white';
    bgCtx.fillRect(0, 0, backgroundCanvas.width, backgroundCanvas.height);
    
    let yPos = 80;
    const lineHeight = mcqFontSize + 12;
    const qFontSize = mcqFontSize + 4;
    
    bgCtx.font = `bold ${qFontSize}px "Segoe UI"`;
    bgCtx.fillStyle = '#1a5276';
    wrapText(bgCtx, `Q${index+1}. ${slide.q}`, 50, yPos, backgroundCanvas.width - 100, lineHeight);
    yPos += getTextHeight(bgCtx, `Q${index+1}. ${slide.q}`, backgroundCanvas.width - 100) + 8;
    
    bgCtx.font = `${mcqFontSize}px "Segoe UI"`;
    bgCtx.fillStyle = '#2c3e66';
    if(slide.a) { wrapText(bgCtx, `A) ${slide.a}`, 70, yPos, backgroundCanvas.width - 100, lineHeight); yPos += getTextHeight(bgCtx, `A) ${slide.a}`, backgroundCanvas.width - 100) + 5; }
    if(slide.b) { wrapText(bgCtx, `B) ${slide.b}`, 70, yPos, backgroundCanvas.width - 100, lineHeight); yPos += getTextHeight(bgCtx, `B) ${slide.b}`, backgroundCanvas.width - 100) + 5; }
    if(slide.c) { wrapText(bgCtx, `C) ${slide.c}`, 70, yPos, backgroundCanvas.width - 100, lineHeight); yPos += getTextHeight(bgCtx, `C) ${slide.c}`, backgroundCanvas.width - 100) + 5; }
    if(slide.d) { wrapText(bgCtx, `D) ${slide.d}`, 70, yPos, backgroundCanvas.width - 100, lineHeight); yPos += getTextHeight(bgCtx, `D) ${slide.d}`, backgroundCanvas.width - 100) + 5; }
    
    if(slide.ans) {
      bgCtx.font = `italic ${mcqFontSize-2}px "Segoe UI"`;
      bgCtx.fillStyle = '#27ae60';
      wrapText(bgCtx, `✓ Answer: ${slide.ans}`, 70, yPos, backgroundCanvas.width - 100, lineHeight);
    }
    
    redrawAll();
    if(window.MathJax) MathJax.typesetPromise();
  }
  
  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split('');
    let line = '';
    let currentY = y;
    for(let i = 0; i < words.length; i++) {
      const testLine = line + words[i];
      const metrics = ctx.measureText(testLine);
      if(metrics.width > maxWidth && line.length > 0) {
        ctx.fillText(line, x, currentY);
        line = words[i];
        currentY += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, x, currentY);
    return currentY + lineHeight;
  }
  
  function getTextHeight(ctx, text, maxWidth) {
    let lines = 1;
    let line = '';
    for(let i=0; i<text.length; i++) {
      const testLine = line + text[i];
      if(ctx.measureText(testLine).width > maxWidth && line.length > 0) {
        lines++;
        line = text[i];
      } else {
        line = testLine;
      }
    }
    return lines * (mcqFontSize + 8);
  }
  
  function updateSlideDisplay() {
    if(!slides.length) return;
    drawSlideOnBackground(slides[currentSlideIndex], currentSlideIndex);
    // Update sidebar list
    const container = document.getElementById('slideList');
    container.innerHTML = '';
    slides.forEach((slide, idx) => {
      const div = document.createElement('div');
      div.className = 'slide-item' + (idx === currentSlideIndex ? ' active' : '');
      div.innerHTML = `<strong>Slide ${idx+1}</strong><br>${slide.q.substring(0, 50)}${slide.q.length>50?'...':''}`;
      div.onclick = () => { currentSlideIndex = idx; updateSlideDisplay(); };
      container.appendChild(div);
    });
  }
  
  document.getElementById('quizUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      slides = parseSlides(ev.target.result);
      if(slides.length) {
        setCanvasSize(1200, 800);
        contentType = 'mcq';
        currentSlideIndex = 0;
        updateSlideDisplay();
        document.getElementById('slideSidebar').style.display = 'flex';
        showToast(`${slides.length} slides loaded! Click on right sidebar to switch.`);
      } else {
        showToast('No valid slides! Use |Q| format with ###', true);
      }
    };
    reader.readAsText(file);
  });
  
  // Font size controls
  document.getElementById('fontPlus').onclick = () => { mcqFontSize = Math.min(36, mcqFontSize+2); document.getElementById('fontSizeDisplay').innerText = mcqFontSize+'px'; if(slides.length) drawSlideOnBackground(slides[currentSlideIndex], currentSlideIndex); };
  document.getElementById('fontMinus').onclick = () => { mcqFontSize = Math.max(12, mcqFontSize-2); document.getElementById('fontSizeDisplay').innerText = mcqFontSize+'px'; if(slides.length) drawSlideOnBackground(slides[currentSlideIndex], currentSlideIndex); };
  
  // ========== IMAGES WITH DRAG ==========
  function drawAllImages() {
    images.forEach((imgData, idx) => {
      [mainDrawCtx, topDrawCtx].forEach(ctx => {
        ctx.save();
        ctx.translate(imgData.x + imgData.width/2, imgData.y + imgData.height/2);
        ctx.rotate(imgData.rotation * Math.PI/180);
        ctx.scale(imgData.flipH ? -1 : 1, imgData.flipV ? -1 : 1);
        ctx.drawImage(imgData.img, -imgData.width/2, -imgData.height/2, imgData.width, imgData.height);
        ctx.restore();
      });
    });
    redrawAll();
  }
  
  function addImageToCanvas(imgElement) {
    const imgWidth = 250, imgHeight = (imgElement.height/imgElement.width)*250;
    images.push({ img: imgElement, x: 100, y: 100, width: imgWidth, height: imgHeight, rotation: 0, flipH: false, flipV: false });
    drawAllImages();
    saveHistory();
    showToast('Image added! Drag to move, use toolbar to resize/rotate (coming soon)');
  }
  
  document.getElementById('imageUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = () => addImageToCanvas(img);
    img.src = URL.createObjectURL(file);
  });
  
  // Simple image drag (select first image)
  mainCanvas.addEventListener('mousedown', (e) => {
    if(currentTool !== 'draw') return;
    const pos = getCanvasCoords(e);
    // Check if clicking on any image
    for(let i=images.length-1; i>=0; i--) {
      const img = images[i];
      if(pos.x >= img.x && pos.x <= img.x+img.width && pos.y >= img.y && pos.y <= img.y+img.height) {
        selectedImageIndex = i;
        isDraggingImage = true;
        dragStart = {x: pos.x - img.x, y: pos.y - img.y};
        e.preventDefault();
        return;
      }
    }
    selectedImageIndex = -1;
    startDraw(e);
  });
  
  window.addEventListener('mousemove', (e) => {
    if(isDraggingImage && selectedImageIndex >= 0) {
      const pos = getCanvasCoords(e);
      images[selectedImageIndex].x = pos.x - dragStart.x;
      images[selectedImageIndex].y = pos.y - dragStart.y;
      drawAllImages();
      e.preventDefault();
    } else if(isDrawing) {
      drawMove(e);
    }
  });
  
  window.addEventListener('mouseup', (e) => {
    if(isDraggingImage) {
      isDraggingImage = false;
      saveHistory();
    }
    if(isDrawing) endDraw(e);
  });
  
  // Touch drag for images
  mainCanvas.addEventListener('touchstart', (e) => {
    if(e.touches.length === 1) {
      const pos = getCanvasCoords(e);
      for(let i=images.length-1; i>=0; i--) {
        const img = images[i];
        if(pos.x >= img.x && pos.x <= img.x+img.width && pos.y >= img.y && pos.y <= img.y+img.height) {
          selectedImageIndex = i;
          isDraggingImage = true;
          dragStart = {x: pos.x - img.x, y: pos.y - img.y};
          e.preventDefault();
          return;
        }
      }
      selectedImageIndex = -1;
      startDraw(e);
    }
  });
  
  mainCanvas.addEventListener('touchmove', (e) => {
    if(isDraggingImage && selectedImageIndex >= 0 && e.touches.length === 1) {
      const pos = getCanvasCoords(e);
      images[selectedImageIndex].x = pos.x - dragStart.x;
      images[selectedImageIndex].y = pos.y - dragStart.y;
      drawAllImages();
      e.preventDefault();
    } else if(isDrawing && e.touches.length === 1) {
      drawMove(e);
    } else if(e.touches.length === 2 && !isDrawing && !isDraggingImage) {
      // Pinch zoom
      const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const rect = mainCanvas.getBoundingClientRect();
      const newMid = {
        x: ((e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left) * (mainCanvas.width/rect.width),
        y: ((e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top) * (mainCanvas.height/rect.height)
      };
      if(pinchDist) {
        const zoom = newDist / pinchDist;
        const worldX = (pinchMid.x - offsetX) / scale;
        const worldY = (pinchMid.y - offsetY) / scale;
        scale *= zoom;
        scale = Math.min(12, Math.max(0.2, scale));
        offsetX = pinchMid.x - worldX * scale;
        offsetY = pinchMid.y - worldY * scale;
        offsetX += newMid.x - pinchMid.x;
        offsetY += newMid.y - pinchMid.y;
        redrawAll();
      }
      pinchDist = newDist;
      pinchMid = newMid;
      e.preventDefault();
    }
  });
  
  mainCanvas.addEventListener('touchend', (e) => {
    if(isDraggingImage) {
      isDraggingImage = false;
      saveHistory();
    }
    if(e.touches.length < 2) pinchDist = 0;
    if(e.touches.length === 0 && isDrawing) endDraw(e);
  });
  
  // ========== UI BUTTONS ==========
  function highlightTool(id) {
    ['drawModeBtn','eraserBtn','smartEraseBtn'].forEach(i => document.getElementById(i).classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  
  document.getElementById('drawModeBtn').onclick = () => { currentTool='draw'; highlightTool('drawModeBtn'); };
  document.getElementById('eraserBtn').onclick = () => { currentTool='eraser'; highlightTool('eraserBtn'); };
  document.getElementById('smartEraseBtn').onclick = () => { currentTool='smartErase'; highlightTool('smartEraseBtn'); };
  document.getElementById('clearAllBtn').onclick = () => { 
    if(confirm('Clear all drawings?')) { 
      mainDrawCtx.clearRect(0,0, drawingLayerMain.width, drawingLayerMain.height); 
      topDrawCtx.clearRect(0,0, drawingLayerTop.width, drawingLayerTop.height); 
      currentStrokes = []; 
      images = [];
      saveHistory(); 
      redrawAll(); 
    } 
  };
  document.getElementById('undoBtn').onclick = undo;
  document.getElementById('redoBtn').onclick = redo;
  document.getElementById('penColor').addEventListener('input', (e) => penColor = e.target.value);
  document.getElementById('brushWidth').addEventListener('input', (e) => { penSize = parseInt(e.target.value); document.getElementById('sizeLabel').innerText = penSize+'px'; });
  
  // ========== TELEGRAM & RECORDING ==========
  async function testTelegram() { 
    try { 
      const r = await fetch(`https://api.telegram.org/bot${TELEGRAM.BOT_TOKEN}/getMe`); 
      const j = await r.json(); 
      showToast(j.ok ? 'Bot OK' : 'Failed', !j.ok); 
    } catch(e) { showToast('Network error', true); } 
  }
  
  async function uploadToTelegram(blob, filename) {
    const fd = new FormData(); 
    fd.append('chat_id', TELEGRAM.CHAT_ID); 
    fd.append('document', blob, filename);
    try { 
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM.BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd }); 
      return (await res.json()).ok; 
    } catch(e) { return false; }
  }
  
  async function startRecording() {
    if(isRecording) { 
      if(mediaRecorder) mediaRecorder.stop(); 
      if(recordingInterval) clearInterval(recordingInterval); 
      isRecording=false; 
      document.getElementById('recIndicator').style.display='none'; 
      showToast('Recording saved'); 
      return; 
    }
    
    let audioTracks = null;
    if(isMicEnabled) { 
      try { 
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
        audioTracks = audioStream.getAudioTracks(); 
      } catch(e){} 
    }
    
    hiddenRecordCanvas.width = topCanvas.width; 
    hiddenRecordCanvas.height = topCanvas.height;
    const canvasStream = hiddenRecordCanvas.captureStream(20);
    let finalStream = canvasStream;
    if(audioTracks && audioTracks.length) finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);
    
    mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm' });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if(e.data.size) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      await uploadToTelegram(blob, `whiteboard_${Date.now()}.webm`);
      const a = document.createElement('a'); 
      a.href = URL.createObjectURL(blob); 
      a.download = 'recording.webm'; 
      a.click();
      if(recordingInterval) clearInterval(recordingInterval);
    };
    
    recordingInterval = setInterval(() => { 
      hiddenRecordCtx.drawImage(topCanvas, 0, 0); 
    }, 40);
    
    mediaRecorder.start(500);
    isRecording=true; 
    document.getElementById('recIndicator').style.display='block';
  }
  
  async function enableMic() { 
    try { 
      if(micStream) { 
        micStream.getTracks().forEach(t=>t.stop()); 
        micStream=null; 
        isMicEnabled=false; 
        showToast('Mic disabled'); 
        return; 
      } 
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
      micStream=stream; 
      isMicEnabled=true; 
      showToast('Mic ready'); 
    } catch(e){ showToast('Mic denied',true); } 
  }
  
  document.getElementById('recordBtn').onclick = startRecording;
  document.getElementById('testTelegramBtn').onclick = testTelegram;
  document.getElementById('toggleMicBtn').onclick = enableMic;
  
  // ========== INIT ==========
  setCanvasSize(1200, 800);
  saveHistory();
  testTelegram();
</script>
