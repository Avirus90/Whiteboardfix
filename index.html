<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pro Whiteboard · Dual Canvas + PDF + Record</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      background: #0b0f17;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    :root {
      --bg: #111827;
      --surface: #1c2436;
      --accent: #3b82f6;
      --danger: #ef4444;
      --text: #e2e8f0;
      --border: #2d3a52;
    }
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(18,25,45,0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      z-index: 50;
    }
    .tool-group { display: flex; gap: 4px; align-items: center; }
    .tool-btn {
      background: #1e293b;
      border: 1px solid transparent;
      color: #cbd5e1;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .tool-btn.active {
      background: var(--accent);
      border-color: #90b4ff;
      color: white;
      box-shadow: 0 0 14px rgba(59,130,246,0.5);
    }
    .tool-btn.danger-active {
      background: var(--danger);
      border-color: #f87171;
      color: white;
    }
    .tool-btn:hover { background: #334155; }
    input[type="color"] { width: 28px; height: 28px; border-radius: 20px; cursor: pointer; border: 2px solid white; }
    input[type="range"] { width: 60px; accent-color: var(--accent); }
    select {
      background: #1e293b;
      color: white;
      border: 1px solid #3b4b66;
      border-radius: 20px;
      padding: 6px 10px;
      font-size: 13px;
    }
    .sep { width: 1px; height: 24px; background: #334155; margin: 0 6px; }

    #boards-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }
    .top-board {
      flex: 1;
      background: #1a1f2e;
      border-radius: 22px;
      border: 1px solid rgba(59,130,246,0.3);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bottom-board {
      flex: 1.5;
      background: #0f1322;
      border-radius: 22px;
      border: 1px solid rgba(139,92,246,0.3);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      background: white;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    #topCanvas { cursor: default; }
    #bottomCanvas { touch-action: none; }

    #pdf-slider {
      background: #101624;
      padding: 8px 12px;
      display: none;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      border-bottom: 1px solid #2a3456;
    }
    .thumb {
      width: 64px;
      height: 44px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      background: white;
      flex-shrink: 0;
    }
    .thumb.active {
      border-color: #3b82f6;
      box-shadow: 0 0 16px #3b82f680;
    }
    .thumb canvas { width: 100%; height: 100%; }

    #latex-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #latex-modal.show { display: flex; }
    .modal-box {
      background: #1e293b;
      padding: 24px;
      border-radius: 20px;
      width: 420px;
      border: 1px solid #3b4b66;
    }
    textarea {
      width: 100%;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      resize: vertical;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 300;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .canvas-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    #viewport-indicator {
      position: absolute;
      border: 2px dashed rgba(255,180,50,0.7);
      background: rgba(255,180,50,0.08);
      pointer-events: none;
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" id="btn-pen">✒️ Pen</button>
      <button class="tool-btn" id="btn-eraser">🧹 Eraser</button>
      <button class="tool-btn" id="btn-stroke-eraser">✂️ Stroke</button>
      <button class="tool-btn" id="btn-pan">🤚 Pan</button>
      <button class="tool-btn" id="btn-edit">🔧 Edit</button>
    </div>
    <div class="sep"></div>
    <input type="color" id="penColor" value="#1e293b">
    <input type="range" id="penSize" min="1" max="15" value="3">
    <span style="color:#cbd5e1; font-size:12px; min-width:30px;" id="sizeLabel">3px</span>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-undo">↩ Undo</button>
    <button class="tool-btn" id="btn-redo">↪ Redo</button>
    <button class="tool-btn" id="btn-clear">🗑 Clear</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-shape-rect">▭ Rect</button>
    <button class="tool-btn" id="btn-shape-circle">○ Circle</button>
    <button class="tool-btn" id="btn-shape-triangle">△ Tri</button>
    <button class="tool-btn" id="btn-shape-line">╱ Line</button>
    <button class="tool-btn" id="btn-image">🖼 Image</button>
    <button class="tool-btn" id="btn-latex">📐 LaTeX</button>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-record">🎤 Rec</button>
    <span style="color:#94a3b8; font-size:11px;" id="recStatus">Off</span>
    <button class="tool-btn" id="btn-pdf-upload">📄 PDF</button>
    <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
  </div>

  <div id="pdf-slider"></div>

  <div id="boards-container">
    <div class="top-board">
      <div class="canvas-wrapper" id="topWrapper">
        <canvas id="topCanvas"></canvas>
        <div id="viewport-indicator"></div>
      </div>
    </div>
    <div class="bottom-board">
      <div class="canvas-wrapper" id="bottomWrapper">
        <canvas id="bottomCanvas"></canvas>
      </div>
    </div>
  </div>

  <div id="latex-modal">
    <div class="modal-box">
      <h3 style="color:white;">Enter LaTeX Equation</h3>
      <textarea id="latexInput" rows="3" placeholder="e.g. \frac{-b\pm\sqrt{b^2-4ac}}{2a}"></textarea>
      <div id="latexPreview" style="min-height:40px; margin:10px 0; color:white;"></div>
      <button class="tool-btn" id="latexInsert" style="background:#3b82f6;color:white;">Insert</button>
      <button class="tool-btn" id="latexCancel">Cancel</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      const topCanvas = document.getElementById('topCanvas');
      const topCtx = topCanvas.getContext('2d');
      const bottomCanvas = document.getElementById('bottomCanvas');
      const bottomCtx = bottomCanvas.getContext('2d');
      const topWrapper = document.getElementById('topWrapper');
      const bottomWrapper = document.getElementById('bottomWrapper');
      const viewportIndicator = document.getElementById('viewport-indicator');

      // SHARED DIMENSIONS — both canvases use these exact same values
      const WORLD_W = 1280;
      const WORLD_H = 720;  // 16:9
      let displayW, displayH; // pixel dimensions both canvases get

      // View transform for bottom canvas
      let zoom = 2.0;
      let panX = 0, panY = 0;
      let isPanning = false;
      let panStartMouse = {x:0,y:0};
      let panStartPan = {x:0,y:0};

      // Content
      let strokes = [];
      let shapes = [];
      let images = [];
      let latexItems = [];
      let nextId = 1;

      const MAX_HISTORY = 50;
      let undoStack = [];
      let redoStack = [];

      let currentTool = 'pen';
      let editMode = false;
      let penColor = '#1e293b';
      let penSize = 3;
      let isDrawing = false;
      let currentStroke = null;

      let selectedItem = null;
      let editDragMode = null;
      let editStart = {x:0,y:0};
      let editItemStart = null;
      let editHandle = null;

      let pdfDoc = null;
      let pdfPages = [];
      let currentPdfPage = 0;
      let pdfBgImage = null;

      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;
      let audioStream = null;

      let ignorePointer = false;

      // ──────────────────────────────────────
      // RESIZE — both canvases get identical dimensions
      // ──────────────────────────────────────
      function resizeCanvases() {
        const topRect = topWrapper.getBoundingClientRect();
        const bottomRect = bottomWrapper.getBoundingClientRect();
        
        // Choose the maximum size that fits both containers while maintaining 16:9
        const maxW = Math.min(topRect.width, bottomRect.width);
        const maxH = Math.min(topRect.height, bottomRect.height);
        
        if (maxW / maxH > WORLD_W / WORLD_H) {
          displayH = maxH;
          displayW = displayH * (WORLD_W / WORLD_H);
        } else {
          displayW = maxW;
          displayH = displayW / (WORLD_W / WORLD_H);
        }
        
        // BOTH canvases get the SAME pixel dimensions
        topCanvas.width = WORLD_W;
        topCanvas.height = WORLD_H;
        topCanvas.style.width = displayW + 'px';
        topCanvas.style.height = displayH + 'px';

        bottomCanvas.width = WORLD_W;
        bottomCanvas.height = WORLD_H;
        bottomCanvas.style.width = displayW + 'px';
        bottomCanvas.style.height = displayH + 'px';

        clampPan();
        renderAll();
      }

      function clampPan() {
        const viewW = WORLD_W / zoom;
        const viewH = WORLD_H / zoom;
        panX = Math.min(0, Math.max(-WORLD_W + viewW, panX));
        panY = Math.min(0, Math.max(-WORLD_H + viewH, panY));
        if (viewW >= WORLD_W) panX = (WORLD_W - viewW) / 2;
        if (viewH >= WORLD_H) panY = (WORLD_H - viewH) / 2;
      }

      window.addEventListener('resize', resizeCanvases);
      resizeCanvases();

      // ──────────────────────────────────────
      // HISTORY
      // ──────────────────────────────────────
      function saveState() {
        const state = {
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(img => ({...img, imgElement: null})),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        };
        undoStack.push(state);
        if (undoStack.length > MAX_HISTORY) undoStack.shift();
        redoStack = [];
      }

      function undo() {
        if (undoStack.length === 0) return;
        redoStack.push({
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(img => ({...img, imgElement: null})),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        });
        const prev = undoStack.pop();
        strokes = prev.strokes;
        shapes = prev.shapes;
        const imgMap = new Map(images.map(img => [img.id, img.imgElement]));
        images = prev.images.map(p => ({...p, imgElement: imgMap.get(p.id)}));
        latexItems = prev.latexItems;
        renderAll();
      }

      function redo() {
        if (redoStack.length === 0) return;
        undoStack.push({
          strokes: JSON.parse(JSON.stringify(strokes)),
          shapes: JSON.parse(JSON.stringify(shapes)),
          images: images.map(img => ({...img, imgElement: null})),
          latexItems: JSON.parse(JSON.stringify(latexItems)),
        });
        const next = redoStack.pop();
        strokes = next.strokes;
        shapes = next.shapes;
        const imgMap = new Map(images.map(img => [img.id, img.imgElement]));
        images = next.images.map(p => ({...p, imgElement: imgMap.get(p.id)}));
        latexItems = next.latexItems;
        renderAll();
      }

      // ──────────────────────────────────────
      // RENDERING
      // ──────────────────────────────────────
      function renderAll() {
        renderTop();
        renderBottom();
        updateViewportIndicator();
      }

      function renderTop() {
        topCtx.clearRect(0, 0, WORLD_W, WORLD_H);
        topCtx.fillStyle = '#ffffff';
        topCtx.fillRect(0, 0, WORLD_W, WORLD_H);
        if (pdfBgImage) topCtx.drawImage(pdfBgImage, 0, 0, WORLD_W, WORLD_H);
        drawContent(topCtx);
      }

      function renderBottom() {
        bottomCtx.clearRect(0, 0, WORLD_W, WORLD_H);
        bottomCtx.fillStyle = '#ffffff';
        bottomCtx.fillRect(0, 0, WORLD_W, WORLD_H);
        bottomCtx.save();
        bottomCtx.translate(panX, panY);
        bottomCtx.scale(zoom, zoom);
        if (pdfBgImage) {
          bottomCtx.globalAlpha = 0.5;
          bottomCtx.drawImage(pdfBgImage, 0, 0, WORLD_W, WORLD_H);
          bottomCtx.globalAlpha = 1;
        }
        drawContent(bottomCtx);
        bottomCtx.restore();
        drawGrid();
        bottomCtx.strokeStyle = '#888';
        bottomCtx.lineWidth = 1.5;
        bottomCtx.strokeRect(0, 0, WORLD_W, WORLD_H);
      }

      function drawContent(ctx) {
        for (const s of strokes) {
          ctx.save();
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          if (s.type === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
          } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = s.color;
          }
          ctx.lineWidth = s.size;
          if (s.points.length >= 2) {
            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (let i = 1; i < s.points.length; i++) {
              const prev = s.points[i-1], curr = s.points[i];
              ctx.quadraticCurveTo(prev.x, prev.y, (prev.x+curr.x)/2, (prev.y+curr.y)/2);
            }
            ctx.lineTo(s.points[s.points.length-1].x, s.points[s.points.length-1].y);
            ctx.stroke();
          } else if (s.points.length === 1) {
            ctx.beginPath();
            ctx.arc(s.points[0].x, s.points[0].y, s.size/2, 0, Math.PI*2);
            ctx.fillStyle = s.type==='eraser' ? '#000' : s.color;
            ctx.fill();
          }
          ctx.restore();
        }
        for (const sh of shapes) {
          ctx.save();
          const cx = sh.x + sh.w/2, cy = sh.y + sh.h/2;
          ctx.translate(cx, cy);
          ctx.rotate((sh.rotation||0) * Math.PI/180);
          ctx.translate(-cx, -cy);
          ctx.strokeStyle = sh.color || penColor;
          ctx.fillStyle = sh.fill || 'transparent';
          ctx.lineWidth = 2;
          ctx.beginPath();
          if (sh.type === 'rect') ctx.roundRect(sh.x, sh.y, sh.w, sh.h, 6);
          else if (sh.type === 'circle') ctx.ellipse(cx, cy, sh.w/2, sh.h/2, 0, 0, Math.PI*2);
          else if (sh.type === 'triangle') { ctx.moveTo(cx, sh.y); ctx.lineTo(sh.x+sh.w, sh.y+sh.h); ctx.lineTo(sh.x, sh.y+sh.h); ctx.closePath(); }
          else if (sh.type === 'line') { ctx.moveTo(sh.x, sh.y); ctx.lineTo(sh.x+sh.w, sh.y+sh.h); }
          ctx.fill();
          ctx.stroke();
          if (sh.selected && editMode) {
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
            ctx.strokeRect(sh.x-6, sh.y-6, sh.w+12, sh.h+12); ctx.setLineDash([]);
            drawHandles(ctx, sh.x-6, sh.y-6, sh.w+12, sh.h+12);
          }
          ctx.restore();
        }
        for (const img of images) {
          ctx.save();
          const cx = img.x + img.w/2, cy = img.y + img.h/2;
          ctx.translate(cx, cy);
          ctx.rotate((img.rotation||0) * Math.PI/180);
          ctx.translate(-cx, -cy);
          ctx.drawImage(img.imgElement, img.x, img.y, img.w, img.h);
          if (img.selected && editMode) {
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
            ctx.strokeRect(img.x-4, img.y-4, img.w+8, img.h+8); ctx.setLineDash([]);
            drawHandles(ctx, img.x-4, img.y-4, img.w+8, img.h+8);
          }
          ctx.restore();
        }
        for (const lt of latexItems) {
          ctx.save();
          const cx = lt.x + lt.w/2, cy = lt.y + lt.h/2;
          ctx.translate(cx, cy);
          ctx.rotate((lt.rotation||0) * Math.PI/180);
          ctx.translate(-cx, -cy);
          if (lt.cachedImg) ctx.drawImage(lt.cachedImg, lt.x, lt.y, lt.w, lt.h);
          if (lt.selected && editMode) {
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
            ctx.strokeRect(lt.x-4, lt.y-4, lt.w+8, lt.h+8); ctx.setLineDash([]);
            drawHandles(ctx, lt.x-4, lt.y-4, lt.w+8, lt.h+8);
          }
          ctx.restore();
        }
      }

      function drawHandles(ctx, x, y, w, h) {
        const handles = [
          {x,y},{x:x+w,y},{x,y:y+h},{x:x+w,y:y+h},
          {x:x+w/2,y},{x:x+w/2,y:y+h},{x,y:y+h/2},{x:x+w,y:y+h/2},
          {x:x+w/2,y:y-16}
        ];
        ctx.fillStyle = '#3b82f6';
        for (const h of handles) {
          ctx.beginPath(); ctx.arc(h.x, h.y, 5, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(x+w/2, y); ctx.lineTo(x+w/2, y-16);
        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5; ctx.setLineDash([]); ctx.stroke();
      }

      function drawGrid() {
        const spacing = 40;
        bottomCtx.strokeStyle = '#e2e8f0';
        bottomCtx.lineWidth = 0.5;
        bottomCtx.beginPath();
        const startX = -panX % (spacing * zoom);
        const startY = -panY % (spacing * zoom);
        for (let x = startX; x <= WORLD_W * zoom; x += spacing * zoom) {
          bottomCtx.moveTo(x, 0); bottomCtx.lineTo(x, WORLD_H * zoom);
        }
        for (let y = startY; y <= WORLD_H * zoom; y += spacing * zoom) {
          bottomCtx.moveTo(0, y); bottomCtx.lineTo(WORLD_W * zoom, y);
        }
        bottomCtx.stroke();
      }

      function updateViewportIndicator() {
        const viewW = WORLD_W / zoom;
        const viewH = WORLD_H / zoom;
        const scaleX = displayW / WORLD_W;
        const scaleY = displayH / WORLD_H;
        viewportIndicator.style.left = (-panX * scaleX) + 'px';
        viewportIndicator.style.top = (-panY * scaleY) + 'px';
        viewportIndicator.style.width = (viewW * scaleX) + 'px';
        viewportIndicator.style.height = (viewH * scaleY) + 'px';
      }

      // ──────────────────────────────────────
      // COORDINATE HELPERS
      // ──────────────────────────────────────
      function screenToWorld(sx, sy) {
        return {
          x: (sx - panX) / zoom,
          y: (sy - panY) / zoom
        };
      }

      function getBottomCoords(e) {
        const rect = bottomCanvas.getBoundingClientRect();
        const scaleX = WORLD_W / rect.width;
        const scaleY = WORLD_H / rect.height;
        const sx = (e.clientX - rect.left) * scaleX;
        const sy = (e.clientY - rect.top) * scaleY;
        return screenToWorld(sx, sy);
      }

      // ──────────────────────────────────────
      // BOTTOM CANVAS EVENTS
      // ──────────────────────────────────────
      function onPointerDown(e) {
        if (ignorePointer) return;
        e.preventDefault();
        const coords = getBottomCoords(e);
        if (currentTool === 'pan' || (e.button === 1)) { startPan(e); return; }
        if (editMode && currentTool === 'edit') {
          if (selectedItem) {
            const item = getSelectedItemObject();
            if (item) {
              const handle = getHandleAt(e, item);
              if (handle) { startEditDrag(e, selectedItem, handle); return; }
            }
          }
          const hit = hitTest(coords.x, coords.y);
          if (hit) { selectItem(hit); startEditDrag(e, hit, 'move'); }
          else { deselectAll(); renderAll(); }
          return;
        }
        if (currentTool === 'pen' || currentTool === 'eraser') {
          saveState();
          isDrawing = true;
          currentStroke = {
            id: nextId++,
            type: currentTool === 'eraser' ? 'eraser' : 'pen',
            points: [{x:coords.x, y:coords.y}],
            color: currentTool === 'eraser' ? '#000' : penColor,
            size: currentTool === 'eraser' ? 20 : penSize
          };
          strokes.push(currentStroke);
          startVoice();
          renderAll();
        } else if (currentTool === 'strokeEraser') {
          const hitIdx = strokes.findIndex(s => s.type !== 'eraser' && pointNearStroke(coords, s, 15));
          if (hitIdx !== -1) { saveState(); strokes.splice(hitIdx, 1); renderAll(); }
        } else if (currentTool.startsWith('shape-')) {
          saveState();
          const type = currentTool.replace('shape-', '');
          const shape = { id: nextId++, type, x: coords.x, y: coords.y, w: 0, h: 0, rotation: 0, color: penColor, fill: 'transparent', selected: false };
          shapes.push(shape);
          isDrawing = false; currentStroke = null;
          startShapeDraw(shape, coords);
        }
      }

      function onPointerMove(e) {
        if (ignorePointer) return;
        e.preventDefault();
        if (isPanning) {
          panX = panStartPan.x + (e.clientX - panStartMouse.x);
          panY = panStartPan.y + (e.clientY - panStartMouse.y);
          clampPan(); renderAll(); return;
        }
        if (editDragMode && selectedItem) { handleEditDrag(e); return; }
        if (isDrawing && currentStroke) {
          currentStroke.points.push(getBottomCoords(e));
          renderAll();
        }
        if (window._drawingShape) updateShapeDraw(window._drawingShape, getBottomCoords(e));
      }

      function onPointerUp(e) {
        if (ignorePointer) return;
        if (isPanning) { isPanning = false; bottomCanvas.style.cursor = currentTool==='pan'?'grab':(editMode?'default':'crosshair'); return; }
        if (isDrawing) { isDrawing = false; currentStroke = null; stopVoice(); renderAll(); }
        if (window._drawingShape) {
          if (window._drawingShape.w < 5 || window._drawingShape.h < 5) shapes.pop();
          window._drawingShape = null; renderAll();
        }
        if (editDragMode) { editDragMode = null; editStart = null; editItemStart = null; editHandle = null; renderAll(); }
      }

      function startPan(e) { isPanning = true; panStartMouse = {x:e.clientX, y:e.clientY}; panStartPan = {x:panX, y:panY}; bottomCanvas.style.cursor = 'grabbing'; }
      function startShapeDraw(shape, coords) { window._drawingShape = shape; shape.x = coords.x; shape.y = coords.y; }
      function updateShapeDraw(shape, coords) { shape.x = Math.min(shape.x, coords.x); shape.y = Math.min(shape.y, coords.y); shape.w = Math.abs(coords.x - shape.x); shape.h = Math.abs(coords.y - shape.y); renderAll(); }

      let initialPinchDist = 0, initialZoom = 1, initialPan = {x:0,y:0};
      function onTouchStart(e) {
        e.preventDefault();
        if (e.touches.length === 2) {
          ignorePointer = true;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          initialPinchDist = Math.hypot(dx, dy);
          initialZoom = zoom;
          initialPan = {x: panX, y: panY};
        } else if (e.touches.length === 1 && !ignorePointer) onPointerDown(e.touches[0]);
      }
      function onTouchMove(e) {
        e.preventDefault();
        if (e.touches.length === 2 && initialPinchDist) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const scale = Math.hypot(dx, dy) / initialPinchDist;
          zoom = Math.min(8, Math.max(0.5, initialZoom * scale));
          const rect = bottomCanvas.getBoundingClientRect();
          const midX = ((e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left) * (WORLD_W/rect.width);
          const midY = ((e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top) * (WORLD_H/rect.height);
          const worldBefore = screenToWorld(midX, midY);
          panX = initialPan.x; panY = initialPan.y;
          const worldAfter = screenToWorld(midX, midY);
          panX += (worldAfter.x - worldBefore.x) * zoom;
          panY += (worldAfter.y - worldBefore.y) * zoom;
          clampPan(); renderAll();
        } else if (e.touches.length === 1 && !ignorePointer) onPointerMove(e.touches[0]);
      }
      function onTouchEnd(e) {
        if (e.touches.length === 0) { ignorePointer = false; initialPinchDist = 0; }
        onPointerUp(e);
      }

      bottomCanvas.addEventListener('pointerdown', onPointerDown);
      bottomCanvas.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      bottomCanvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = bottomCanvas.getBoundingClientRect();
        const sx = (e.clientX - rect.left) * (WORLD_W / rect.width);
        const sy = (e.clientY - rect.top) * (WORLD_H / rect.height);
        const worldBefore = screenToWorld(sx, sy);
        zoom = Math.min(8, Math.max(0.5, zoom * (1 - e.deltaY * 0.005)));
        const worldAfter = screenToWorld(sx, sy);
        panX += (worldAfter.x - worldBefore.x) * zoom;
        panY += (worldAfter.y - worldBefore.y) * zoom;
        clampPan(); renderAll();
      }, {passive:false});
      bottomCanvas.addEventListener('touchstart', onTouchStart, {passive:false});
      bottomCanvas.addEventListener('touchmove', onTouchMove, {passive:false});
      bottomCanvas.addEventListener('touchend', onTouchEnd);

      // ──────────────────────────────────────
      // HIT TEST & SELECTION
      // ──────────────────────────────────────
      function hitTest(wx, wy) {
        for (let i=shapes.length-1; i>=0; i--) { const s=shapes[i]; if(wx>=s.x-8 && wx<=s.x+s.w+8 && wy>=s.y-8 && wy<=s.y+s.h+8) return {type:'shape',index:i}; }
        for (let i=images.length-1; i>=0; i--) { const img=images[i]; if(wx>=img.x && wx<=img.x+img.w && wy>=img.y && wy<=img.y+img.h) return {type:'image',index:i}; }
        for (let i=latexItems.length-1; i>=0; i--) { const lt=latexItems[i]; if(wx>=lt.x && wx<=lt.x+lt.w && wy>=lt.y && wy<=lt.y+lt.h) return {type:'latex',index:i}; }
        return null;
      }
      function selectItem(hit) {
        deselectAll(); selectedItem = hit;
        if (hit.type==='shape') shapes[hit.index].selected=true;
        else if (hit.type==='image') images[hit.index].selected=true;
        else if (hit.type==='latex') latexItems[hit.index].selected=true;
        renderAll();
      }
      function deselectAll() {
        shapes.forEach(s=>s.selected=false); images.forEach(i=>i.selected=false); latexItems.forEach(l=>l.selected=false);
        selectedItem=null; renderAll();
      }
      function pointNearStroke(p, s, t) { return s.points.some(pt=>Math.hypot(pt.x-p.x,pt.y-p.y)<t); }
      function getSelectedItemObject() {
        if (!selectedItem) return null;
        if (selectedItem.type==='shape') return shapes[selectedItem.index];
        if (selectedItem.type==='image') return images[selectedItem.index];
        if (selectedItem.type==='latex') return latexItems[selectedItem.index];
        return null;
      }
      function getHandleAt(e, item) {
        const rect = bottomCanvas.getBoundingClientRect();
        const sx = (e.clientX-rect.left)*(WORLD_W/rect.width);
        const sy = (e.clientY-rect.top)*(WORLD_H/rect.height);
        const world = screenToWorld(sx,sy);
        const bbox = {x:item.x-6,y:item.y-6,w:item.w+12,h:item.h+12};
        if (Math.hypot(world.x-(bbox.x+bbox.w/2), world.y-(bbox.y-16))<12) return 'rotate';
        const handles = [
          {n:'top-left',x:bbox.x,y:bbox.y},{n:'top-right',x:bbox.x+bbox.w,y:bbox.y},
          {n:'bottom-left',x:bbox.x,y:bbox.y+bbox.h},{n:'bottom-right',x:bbox.x+bbox.w,y:bbox.y+bbox.h},
          {n:'top',x:bbox.x+bbox.w/2,y:bbox.y},{n:'bottom',x:bbox.x+bbox.w/2,y:bbox.y+bbox.h},
          {n:'left',x:bbox.x,y:bbox.y+bbox.h/2},{n:'right',x:bbox.x+bbox.w,y:bbox.y+bbox.h/2}
        ];
        for (const h of handles) if (Math.hypot(world.x-h.x, world.y-h.y)<12) return h.n;
        return null;
      }
      function startEditDrag(e, hit, handle) {
        editStart = {x:e.clientX,y:e.clientY};
        const item = getSelectedItemObject(); if(!item) return;
        editItemStart = {x:item.x,y:item.y,w:item.w,h:item.h,rotation:item.rotation};
        editDragMode = (handle==='rotate')?'rotate':(handle==='move'?'move':'resize');
        editHandle = handle;
      }
      function handleEditDrag(e) {
        if (!selectedItem||!editDragMode) return;
        const item = getSelectedItemObject(); if(!item) return;
        const dx = (e.clientX-editStart.x)/zoom, dy = (e.clientY-editStart.y)/zoom;
        if (editDragMode==='move') { item.x=editItemStart.x+dx; item.y=editItemStart.y+dy; }
        else if (editDragMode==='resize'&&editHandle) {
          const s=editItemStart; let nx=s.x,ny=s.y,nw=s.w,nh=s.h;
          switch(editHandle){
            case'top-left':nx=s.x+dx;ny=s.y+dy;nw=s.w-dx;nh=s.h-dy;break;
            case'top-right':ny=s.y+dy;nw=s.w+dx;nh=s.h-dy;break;
            case'bottom-left':nx=s.x+dx;nw=s.w-dx;nh=s.h+dy;break;
            case'bottom-right':nw=s.w+dx;nh=s.h+dy;break;
            case'top':ny=s.y+dy;nh=s.h-dy;break;
            case'bottom':nh=s.h+dy;break;
            case'left':nx=s.x+dx;nw=s.w-dx;break;
            case'right':nw=s.w+dx;break;
          }
          item.x=nx;item.y=ny;item.w=Math.max(10,nw);item.h=Math.max(10,nh);
        } else if (editDragMode==='rotate') {
          const rect=bottomCanvas.getBoundingClientRect();
          const sx=(e.clientX-rect.left)*(WORLD_W/rect.width), sy=(e.clientY-rect.top)*(WORLD_H/rect.height);
          const world=screenToWorld(sx,sy);
          const cx=editItemStart.x+editItemStart.w/2, cy=editItemStart.y+editItemStart.h/2;
          item.rotation=Math.atan2(world.y-cy,world.x-cx)*180/Math.PI;
        }
        renderAll();
      }

      // ──────────────────────────────────────
      // TOOLBAR
      // ──────────────────────────────────────
      function setTool(tool) {
        currentTool=tool; editMode=(tool==='edit');
        document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active','danger-active'));
        const map={pen:'btn-pen',eraser:'btn-eraser',strokeEraser:'btn-stroke-eraser',pan:'btn-pan',edit:'btn-edit','shape-rect':'btn-shape-rect','shape-circle':'btn-shape-circle','shape-triangle':'btn-shape-triangle','shape-line':'btn-shape-line'};
        const btnId=map[tool];
        if(btnId) document.getElementById(btnId).classList.add(tool==='eraser'||tool==='strokeEraser'?'danger-active':'active');
        bottomCanvas.style.cursor=(tool==='pan')?'grab':(editMode?'default':'crosshair');
        if(!editMode) deselectAll();
      }
      document.getElementById('btn-pen').onclick=()=>setTool('pen');
      document.getElementById('btn-eraser').onclick=()=>setTool('eraser');
      document.getElementById('btn-stroke-eraser').onclick=()=>setTool('strokeEraser');
      document.getElementById('btn-pan').onclick=()=>setTool('pan');
      document.getElementById('btn-edit').onclick=()=>setTool('edit');
      document.getElementById('btn-shape-rect').onclick=()=>setTool('shape-rect');
      document.getElementById('btn-shape-circle').onclick=()=>setTool('shape-circle');
      document.getElementById('btn-shape-triangle').onclick=()=>setTool('shape-triangle');
      document.getElementById('btn-shape-line').onclick=()=>setTool('shape-line');
      document.getElementById('btn-undo').onclick=undo;
      document.getElementById('btn-redo').onclick=redo;
      document.getElementById('btn-clear').onclick=()=>{if(confirm('Clear all?')){saveState();strokes=[];shapes=[];images=[];latexItems=[];renderAll();}};
      document.getElementById('penColor').oninput=e=>penColor=e.target.value;
      document.getElementById('penSize').oninput=e=>{penSize=parseInt(e.target.value);document.getElementById('sizeLabel').textContent=penSize+'px';};
      document.getElementById('btn-image').onclick=()=>{
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
        inp.onchange=(e)=>{
          const file=e.target.files[0];if(!file)return;
          const reader=new FileReader();
          reader.onload=(ev)=>{
            const img=new Image();img.onload=()=>{
              saveState();
              const h=120,w=h*(img.width/img.height);
              images.push({id:nextId++,imgElement:img,x:WORLD_W/2-w/2,y:WORLD_H/2-h/2,w,h,rotation:0,selected:false});
              renderAll();
            };img.src=ev.target.result;
          };reader.readAsDataURL(file);
        };inp.click();
      };
      document.getElementById('btn-latex').onclick=()=>document.getElementById('latex-modal').classList.add('show');
      document.getElementById('latexCancel').onclick=()=>document.getElementById('latex-modal').classList.remove('show');
      document.getElementById('latexInsert').onclick=()=>{
        const tex=document.getElementById('latexInput').value.trim();if(!tex)return;
        const temp=document.createElement('div');temp.style.cssText='position:absolute;left:-9999px';
        temp.innerHTML='\\['+tex+'\\]';document.body.appendChild(temp);
        MathJax.typesetPromise([temp]).then(()=>{
          const svg=temp.querySelector('svg');
          if(svg){
            const blob=new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'});
            const url=URL.createObjectURL(blob);
            const img=new Image();img.onload=()=>{
              saveState();
              const h=50,w=h*(img.width/img.height);
              const cached=new Image();cached.src=url;
              latexItems.push({id:nextId++,cachedImg:cached,x:WORLD_W/2-w/2,y:WORLD_H/2-h/2,w,h,rotation:0,selected:false});
              renderAll();
            };img.src=url;
          }
          document.body.removeChild(temp);
        });
        document.getElementById('latex-modal').classList.remove('show');
      };

      async function startVoice() {
        if(isRecording)return;
        try{audioStream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){audioStream=null;}
        const canvasStream=topCanvas.captureStream(30);
        const tracks=[...canvasStream.getVideoTracks()];
        if(audioStream)tracks.push(...audioStream.getAudioTracks());
        mediaRecorder=new MediaRecorder(new MediaStream(tracks),{mimeType:'video/webm'});
        audioChunks=[];
        mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
        mediaRecorder.onstop=()=>{
          const blob=new Blob(audioChunks,{type:'video/webm'});
          const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='whiteboard.webm';a.click();
          toast('Recording saved!');
        };
        mediaRecorder.start();isRecording=true;document.getElementById('recStatus').textContent='🔴 Rec';
      }
      function stopVoice() {
        if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();if(audioStream)audioStream.getTracks().forEach(t=>t.stop());isRecording=false;document.getElementById('recStatus').textContent='Off';}
      }
      document.getElementById('btn-record').onclick=()=>{if(isRecording)stopVoice();else startVoice();};

      document.getElementById('btn-pdf-upload').onclick=()=>document.getElementById('pdfFileInput').click();
      document.getElementById('pdfFileInput').onchange=async(e)=>{
        const file=e.target.files[0];if(!file)return;
        const data=await file.arrayBuffer();
        pdfDoc=await pdfjsLib.getDocument({data}).promise;
        pdfPages=[];
        const slider=document.getElementById('pdf-slider');slider.innerHTML='';slider.style.display='flex';
        for(let i=1;i<=pdfDoc.numPages;i++){
          const page=await pdfDoc.getPage(i);
          const vp=page.getViewport({scale:0.2});
          const thumbCanvas=document.createElement('canvas');thumbCanvas.width=vp.width;thumbCanvas.height=vp.height;
          await page.render({canvasContext:thumbCanvas.getContext('2d'),viewport:vp}).promise;
          const thumbDiv=document.createElement('div');thumbDiv.className='thumb';
          thumbDiv.innerHTML='<canvas width="64" height="44"></canvas>';
          thumbDiv.querySelector('canvas').getContext('2d').drawImage(thumbCanvas,0,0,64,44);
          thumbDiv.onclick=()=>switchPdfPage(i-1);
          slider.appendChild(thumbDiv);pdfPages.push({page,vp});
        }
        currentPdfPage=0;await renderPdfPage(0);
      };
      async function renderPdfPage(idx){
        if(!pdfDoc)return;
        const page=await pdfDoc.getPage(idx+1);
        const scale=Math.min(WORLD_W/page.getViewport({scale:1}).width,WORLD_H/page.getViewport({scale:1}).height)*0.95;
        const vp=page.getViewport({scale});
        const tmpCanvas=document.createElement('canvas');tmpCanvas.width=WORLD_W;tmpCanvas.height=WORLD_H;
        const tmpCtx=tmpCanvas.getContext('2d');tmpCtx.fillStyle='#fff';tmpCtx.fillRect(0,0,WORLD_W,WORLD_H);
        await page.render({canvasContext:tmpCtx,viewport:vp,transform:[1,0,0,1,(WORLD_W-vp.width)/2,(WORLD_H-vp.height)/2]}).promise;
        pdfBgImage=new Image();pdfBgImage.src=tmpCanvas.toDataURL();
        await new Promise(r=>{pdfBgImage.onload=r;});
        document.querySelectorAll('#pdf-slider .thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
        renderAll();
      }
      function switchPdfPage(idx){if(idx!==currentPdfPage){currentPdfPage=idx;renderPdfPage(idx);}}

      window.addEventListener('keydown',(e)=>{
        if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
        if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
        if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
        if(e.key==='p')setTool('pen');if(e.key==='e')setTool('eraser');
        if(e.key===' '){e.preventDefault();setTool('pan');}
      });

      function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      setTool('pen');
      toast('✒️ Both canvases identical • Pinch zoom fixed • Write freely');
    })();
  </script>
</body>
</html>
