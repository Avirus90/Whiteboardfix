<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>16:9 Dual Canvas Whiteboard</title>
    <style>
        * {
            user-select: none;
            touch-action: pan-x pan-y; /* Allow pan but prevent zoom on canvas */
        }
        
        body {
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        /* Upper Canvas - Static Display (16:9) */
        .upper-container {
            background: #1e1e3a;
            padding: 15px;
            border-radius: 20px 20px 0 0;
            border-bottom: 3px solid #e94560;
        }
        
        #upperCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: default;
        }
        
        /* Lower Canvas - Drawing Area with Zoom/Pan (16:9) */
        .lower-container {
            background: #1e1e3a;
            padding: 15px;
            border-radius: 0 0 20px 20px;
            margin-top: 5px;
            position: relative;
        }
        
        #lowerCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: #f0f0f0;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            touch-action: none;
        }
        
        /* Zoom indicator */
        .zoom-badge {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        
        /* Tools Panel */
        .tools {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
            background: #1e1e3a;
            padding: 12px;
            border-radius: 50px;
        }
        
        button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        
        button:active {
            transform: scale(0.94);
            background: #e94560;
        }
        
        .color-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            padding: 0;
        }
        
        .color-btn.black { background: #000; border: 2px solid white; }
        .color-btn.red { background: #e74c3c; }
        .color-btn.blue { background: #3498db; }
        .color-btn.green { background: #2ecc71; }
        
        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
        
        .status-bar {
            background: #0f3460;
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 30px;
            margin-top: 15px;
            font-size: 13px;
        }
        
        @media (max-width: 600px) {
            button { padding: 8px 12px; font-size: 12px; }
            .color-btn { width: 36px; height: 36px; }
            .tools { gap: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    
    <!-- UPPER CANVAS (STATIC - SIRF DIKHEGA) -->
    <div class="upper-container">
        <canvas id="upperCanvas" width="960" height="540"></canvas>
    </div>
    
    <!-- LOWER CANVAS (YAHAN LIKHENGE ZOOM+PAN KE SAATH) -->
    <div class="lower-container">
        <canvas id="lowerCanvas" width="960" height="540"></canvas>
        <div class="zoom-badge" id="zoomLevel">🔍 Zoom: 1.0x</div>
    </div>
    
    <!-- TOOLS -->
    <div class="tools">
        <button class="color-btn black" onclick="setColor('black')"></button>
        <button class="color-btn red" onclick="setColor('red')"></button>
        <button class="color-btn blue" onclick="setColor('blue')"></button>
        <button class="color-btn green" onclick="setColor('green')"></button>
        <input type="range" id="penSize" min="2" max="20" value="4">
        <button onclick="eraser()">🧽 Eraser</button>
        <button onclick="clearCanvas()">🗑️ Clear</button>
        <button onclick="undo()">↩️ Undo</button>
        <button onclick="startRecording()">⏺️ Record</button>
        <button onclick="stopRecording()">⏹️ Stop</button>
        <button onclick="resetView()">🔍 Reset View</button>
    </div>
    <div class="status-bar" id="status">
        ✨ Lower canvas pe finger se likho | Do ungli se zoom/pan
    </div>
</div>

<script>
    // ============ CONFIGURATION ============
    const CANVAS_W = 960;
    const CANVAS_H = 540;
    
    // OFFSCREEN CANVAS (Actual drawing storage - 16:9 ratio but bigger)
    const offCanvas = document.createElement('canvas');
    offCanvas.width = 1920;  // 2x size for better zoom quality
    offCanvas.height = 1080; // 16:9 ratio maintained
    const offCtx = offCanvas.getContext('2d');
    
    // Initialize offscreen with white background
    offCtx.fillStyle = 'white';
    offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
    offCtx.strokeStyle = 'black';
    offCtx.lineWidth = 4;
    offCtx.lineCap = 'round';
    offCtx.lineJoin = 'round';
    
    // CANVAS ELEMENTS
    const upperCanvas = document.getElementById('upperCanvas');
    const upperCtx = upperCanvas.getContext('2d');
    const lowerCanvas = document.getElementById('lowerCanvas');
    const lowerCtx = lowerCanvas.getContext('2d');
    
    // Set canvas dimensions
    upperCanvas.width = CANVAS_W;
    upperCanvas.height = CANVAS_H;
    lowerCanvas.width = CANVAS_W;
    lowerCanvas.height = CANVAS_H;
    
    // VIEWPORT for zoom/pan on lower canvas
    let viewX = 0, viewY = 0;
    let zoom = 1.0;
    const MIN_ZOOM = 0.8;
    const MAX_ZOOM = 3.0;
    
    // Drawing state
    let drawing = false;
    let lastX = 0, lastY = 0;
    let currentColor = 'black';
    let currentSize = 4;
    let isErasing = false;
    
    // Undo history
    let history = [];
    let historyIndex = -1;
    
    // Recording
    let mediaRecorder;
    let chunks = [];
    let recordingStream = null;
    
    // ============ HELPER FUNCTIONS ============
    
    // Save state for undo
    function saveState() {
        if (historyIndex < history.length - 1) {
            history = history.slice(0, historyIndex + 1);
        }
        const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
        history.push(imageData);
        historyIndex++;
        if (history.length > 30) {
            history.shift();
            historyIndex--;
        }
    }
    
    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            offCtx.putImageData(history[historyIndex], 0, 0);
            renderBothCanvases();
        }
    }
    
    // Convert lower canvas screen coordinates to offscreen coordinates
    function screenToOffscreen(clientX, clientY) {
        const rect = lowerCanvas.getBoundingClientRect();
        const canvasDisplayWidth = rect.width;
        const canvasDisplayHeight = rect.height;
        
        // Normalized position (0 to 1) on lower canvas display
        let nx = (clientX - rect.left) / canvasDisplayWidth;
        let ny = (clientY - rect.top) / canvasDisplayHeight;
        
        // Clamp
        nx = Math.max(0, Math.min(1, nx));
        ny = Math.max(0, Math.min(1, ny));
        
        // Convert to offscreen coordinates considering viewport and zoom
        const viewWidth = offCanvas.width / zoom;
        const viewHeight = offCanvas.height / zoom;
        
        let offX = viewX + nx * viewWidth;
        let offY = viewY + ny * viewHeight;
        
        // Clamp to offscreen bounds
        offX = Math.max(0, Math.min(offCanvas.width, offX));
        offY = Math.max(0, Math.min(offCanvas.height, offY));
        
        return { x: offX, y: offY };
    }
    
    // Render BOTH canvases - Upper shows zoomed view, Lower shows drawing area
    function renderBothCanvases() {
        // 1. RENDER UPPER CANVAS (Zoomed view centered)
        const viewWidth = offCanvas.width / zoom;
        const viewHeight = offCanvas.height / zoom;
        
        // Center the view on upper canvas (static display)
        let srcX = viewX;
        let srcY = viewY;
        
        upperCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        upperCtx.drawImage(offCanvas, srcX, srcY, viewWidth, viewHeight, 
                           0, 0, CANVAS_W, CANVAS_H);
        
        // 2. RENDER LOWER CANVAS (Zoomed + Panned view of offscreen)
        lowerCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        lowerCtx.drawImage(offCanvas, srcX, srcY, viewWidth, viewHeight,
                           0, 0, CANVAS_W, CANVAS_H);
        
        // Update zoom badge
        document.getElementById('zoomLevel').innerHTML = `🔍 Zoom: ${zoom.toFixed(1)}x`;
    }
    
    // Drawing function
    function drawLine(x1, y1, x2, y2) {
        offCtx.beginPath();
        offCtx.moveTo(x1, y1);
        offCtx.lineTo(x2, y2);
        offCtx.strokeStyle = isErasing ? 'white' : currentColor;
        offCtx.lineWidth = currentSize;
        offCtx.stroke();
        renderBothCanvases();
    }
    
    function drawDot(x, y) {
        offCtx.beginPath();
        offCtx.arc(x, y, currentSize/2, 0, Math.PI * 2);
        offCtx.fillStyle = isErasing ? 'white' : currentColor;
        offCtx.fill();
        renderBothCanvases();
    }
    
    // ============ TOUCH & MOUSE HANDLERS ============
    
    function startDraw(e) {
        e.preventDefault();
        drawing = true;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const pos = screenToOffscreen(clientX, clientY);
        lastX = pos.x;
        lastY = pos.y;
        drawDot(lastX, lastY);
    }
    
    function onDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const pos = screenToOffscreen(clientX, clientY);
        drawLine(lastX, lastY, pos.x, pos.y);
        lastX = pos.x;
        lastY = pos.y;
    }
    
    function endDraw(e) {
        if (drawing) {
            drawing = false;
            saveState();
        }
        e.preventDefault();
    }
    
    // ============ ZOOM & PAN WITH TWO FINGERS ============
    
    let initialPinchDistance = 0;
    let initialZoom = 1;
    let initialViewX = 0, initialViewY = 0;
    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    
    function getPinchDistance(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
    }
    
    function handleTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            // Pinch zoom
            initialPinchDistance = getPinchDistance(e.touches);
            initialZoom = zoom;
            initialViewX = viewX;
            initialViewY = viewY;
        } else if (e.touches.length === 1) {
            startDraw(e);
        }
    }
    
    function handleTouchMove(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            const newDistance = getPinchDistance(e.touches);
            let newZoom = initialZoom * (newDistance / initialPinchDistance);
            newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
            
            if (newZoom !== zoom) {
                // Zoom towards center
                const rect = lowerCanvas.getBoundingClientRect();
                const centerX = (rect.left + rect.right) / 2;
                const centerY = (rect.top + rect.bottom) / 2;
                
                const beforePos = screenToOffscreen(centerX, centerY);
                zoom = newZoom;
                const afterPos = screenToOffscreen(centerX, centerY);
                
                viewX += (beforePos.x - afterPos.x);
                viewY += (beforePos.y - afterPos.y);
                
                // Clamp view
                const maxViewX = offCanvas.width - (offCanvas.width / zoom);
                const maxViewY = offCanvas.height - (offCanvas.height / zoom);
                viewX = Math.max(0, Math.min(maxViewX, viewX));
                viewY = Math.max(0, Math.min(maxViewY, viewY));
                
                renderBothCanvases();
            }
        } else if (e.touches.length === 1 && drawing) {
            onDraw(e);
        } else if (e.touches.length === 1 && !drawing) {
            // Single finger pan when not drawing
            if (!isPanning) {
                isPanning = true;
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
            } else {
                const dx = e.touches[0].clientX - panStartX;
                const dy = e.touches[0].clientY - panStartY;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    const panScale = (offCanvas.width / zoom) / CANVAS_W;
                    viewX -= dx * panScale;
                    viewY -= dy * panScale;
                    
                    const maxViewX = offCanvas.width - (offCanvas.width / zoom);
                    const maxViewY = offCanvas.height - (offCanvas.height / zoom);
                    viewX = Math.max(0, Math.min(maxViewX, viewX));
                    viewY = Math.max(0, Math.min(maxViewY, viewY));
                    
                    panStartX = e.touches[0].clientX;
                    panStartY = e.touches[0].clientY;
                    renderBothCanvases();
                }
            }
        }
    }
    
    function handleTouchEnd(e) {
        if (drawing) endDraw(e);
        isPanning = false;
        initialPinchDistance = 0;
    }
    
    // Mouse events for PC testing
    lowerCanvas.addEventListener('mousedown', startDraw);
    lowerCanvas.addEventListener('mousemove', onDraw);
    lowerCanvas.addEventListener('mouseup', endDraw);
    
    // Touch events
    lowerCanvas.addEventListener('touchstart', handleTouchStart);
    lowerCanvas.addEventListener('touchmove', handleTouchMove);
    lowerCanvas.addEventListener('touchend', handleTouchEnd);
    
    // ============ TOOL FUNCTIONS ============
    
    function setColor(color) {
        currentColor = color;
        isErasing = false;
        document.getElementById('status').innerHTML = `🎨 ${color} color selected | Size: ${currentSize}px`;
    }
    
    function eraser() {
        isErasing = true;
        document.getElementById('status').innerHTML = `🧽 Eraser mode ON | Size: ${currentSize}px`;
    }
    
    function clearCanvas() {
        offCtx.fillStyle = 'white';
        offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
        offCtx.fillStyle = currentColor;
        offCtx.strokeStyle = currentColor;
        renderBothCanvases();
        saveState();
    }
    
    function resetView() {
        zoom = 1.0;
        viewX = 0;
        viewY = 0;
        renderBothCanvases();
        document.getElementById('status').innerHTML = '🔄 View reset to 1.0x zoom';
        setTimeout(() => {
            document.getElementById('status').innerHTML = '✨ Lower canvas pe finger se likho | Do ungli se zoom/pan';
        }, 1500);
    }
    
    // Pen size
    document.getElementById('penSize').addEventListener('input', (e) => {
        currentSize = parseInt(e.target.value);
        document.getElementById('status').innerHTML = `✏️ Pen size: ${currentSize}px`;
    });
    
    // ============ SCREEN RECORDING ============
    
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true,
                audio: true 
            });
            recordingStream = stream;
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `teaching-video-${Date.now()}.mp4`;
                a.click();
                URL.revokeObjectURL(url);
                document.getElementById('status').innerHTML = '✅ Video saved successfully!';
                setTimeout(() => {
                    document.getElementById('status').innerHTML = '✨ Lower canvas pe finger se likho | Do ungli se zoom/pan';
                }, 2000);
            };
            
            mediaRecorder.start();
            document.getElementById('status').innerHTML = '🔴 RECORDING in progress...';
        } catch (err) {
            document.getElementById('status').innerHTML = '❌ Recording permission denied';
        }
    }
    
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            if (recordingStream) {
                recordingStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('status').innerHTML = '⏹️ Stopping recording...';
        }
    }
    
    // ============ INITIALIZATION ============
    
    // Set initial view
    viewX = 0;
    viewY = 0;
    zoom = 1.0;
    renderBothCanvases();
    saveState();
    
    // Handle window resize
    function handleResize() {
        renderBothCanvases();
    }
    window.addEventListener('resize', handleResize);
    
    console.log('✅ 16:9 Dual Canvas Ready!');
</script>
</body>
</html>
